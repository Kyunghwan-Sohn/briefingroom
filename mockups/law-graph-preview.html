<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>금융 규제 트래커 · PC + Mobile 프리뷰</title>
<link href="https://cdn.jsdelivr.net/gh/niceplugin/wantedsans@1.0.0/packages/wanted-sans/fonts/webfonts/variable/split/WantedSansVariable.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f0f0f;color:#f0f0f0;font-family:'Wanted Sans Variable',sans-serif;min-height:100vh;padding:32px 24px}
.hdr{max-width:1600px;margin:0 auto 28px}
.hdr h1{font-family:'Gowun Batang',serif;font-size:24px;font-weight:700}
.hdr p{font-size:13px;color:#888;margin-top:6px}

.frame-wrap{max-width:1600px;margin:0 auto;display:grid;grid-template-columns:1fr 400px;gap:24px;align-items:flex-start}
.frame-col{display:flex;flex-direction:column;gap:10px}
.frame-label{font-family:'JetBrains Mono',monospace;font-size:11px;color:#d96c2c;letter-spacing:.08em;text-transform:uppercase;font-weight:700}
.frame-label span{color:#666;letter-spacing:0;text-transform:none;font-weight:500;margin-left:8px}

.desktop-frame{border:1px solid #2e2e2e;border-radius:10px;overflow:hidden;background:#000}
.desktop-chrome{background:#1a1a1a;height:28px;display:flex;align-items:center;padding:0 12px;gap:6px;border-bottom:1px solid #2e2e2e}
.desktop-chrome span{width:9px;height:9px;border-radius:50%;background:#2e2e2e}
.desktop-chrome .url{font-family:'JetBrains Mono',monospace;font-size:10px;color:#666;margin-left:12px}
.desktop-iframe{width:100%;height:1600px;border:0;display:block;background:#f7f7f5}

.phone-col{display:flex;justify-content:center}
.phone{width:390px;background:#1a1a1a;border-radius:38px;padding:12px;box-shadow:0 20px 60px rgba(0,0,0,.5);border:1px solid #333}
.phone-notch{height:22px;display:flex;align-items:center;justify-content:center;margin-bottom:4px}
.phone-notch::before{content:'';width:100px;height:20px;background:#000;border-radius:14px}
.phone-screen{width:100%;height:800px;background:#f7f7f5;border-radius:28px;overflow:hidden}
.phone-iframe{width:100%;height:100%;border:0;display:block}
.phone-bar{height:4px;background:#333;border-radius:2px;width:120px;margin:6px auto 2px}

@media(max-width:1400px){
  .frame-wrap{grid-template-columns:1fr}
  .phone-col{margin:0 auto}
}
</style>
</head>
<body>

<header class="hdr">
  <h1>금융 규제 트래커 · PC + Mobile</h1>
  <p>관계도 그래프 + 트래커 피드 통합</p>
</header>

<div class="frame-wrap">
  <div class="frame-col">
    <div class="frame-label">DESKTOP <span>1080px</span></div>
    <div class="desktop-frame">
      <div class="desktop-chrome">
        <span></span><span></span><span></span>
        <span class="url">govbrief.kr/finlaw/</span>
      </div>
      <iframe class="desktop-iframe" src="law-graph-proto.html"></iframe>
    </div>
  </div>

  <div class="frame-col">
    <div class="frame-label">MOBILE <span>390px</span></div>
    <div class="phone-col">
      <div class="phone">
        <div class="phone-notch"></div>
        <div class="phone-screen">
          <iframe class="phone-iframe" src="law-graph-proto.html?mobile=1"></iframe>
        </div>
        <div class="phone-bar"></div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
