<script>
const SUPABASE_URL = 'https://jxoghnttelexnfoeepbz.supabase.co';
const SUPABASE_KEY = 'sb_publishable_r3eTQXF419LfIiPdE17gyw_zvAQFd5s';
const LLM_URL = 'https://govbrief-api.vercel.app/api/chat';
const SB_HDR = {'apikey': SUPABASE_KEY, 'Authorization': 'Bearer ' + SUPABASE_KEY};

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const introEl = document.getElementById('intro');
const topbarEl = document.getElementById('topbar');

var chatHistory = [];
var lastSearchCtx = null;

// 법령 약칭 매핑
const LAW_ABBR = {
  '자본시장법':'자본시장과 금융투자업에 관한 법률','보험업법':'보험업법','은행법':'은행법',
  '금소법':'금융소비자 보호에 관한 법률','전금법':'전자금융거래법','신용정보법':'신용정보의 이용 및 보호에 관한 법률',
  '여전법':'여신전문금융업법','금융지주회사법':'금융지주회사법','예보법':'예금자보호법',
};

function expandQuery(q) {
  let expanded = q;
  for (const [abbr, full] of Object.entries(LAW_ABBR)) {
    if (q.includes(abbr) && !q.includes(full)) expanded += ' ' + full;
  }
  return expanded;
}

// textarea 자동 높이
inputEl.addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

function escapeHtml(v) {
  return String(v??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 마크다운 렌더링 (링크, 번호리스트, 볼드, 코드 지원)
function renderBotContent(container, text) {
  container.innerHTML = '';
  const lines = String(text??'').split('\n');
  let html = '';
  let inUl = false, inOl = false;

  for (const line of lines) {
    const t = line.trim();
    if (!t) {
      if (inUl) { html += '</ul>'; inUl = false; }
      if (inOl) { html += '</ol>'; inOl = false; }
      continue;
    }
    if (t.startsWith('### ')) {
      if (inUl) { html += '</ul>'; inUl = false; }
      if (inOl) { html += '</ol>'; inOl = false; }
      html += '<h3>' + escapeHtml(t.slice(4)) + '</h3>';
      continue;
    }
    if (t.startsWith('- ')) {
      if (inOl) { html += '</ol>'; inOl = false; }
      if (!inUl) { html += '<ul>'; inUl = true; }
      html += '<li>' + inlineMd(t.slice(2)) + '</li>';
      continue;
    }
    if (/^\d+\.\s/.test(t)) {
      if (inUl) { html += '</ul>'; inUl = false; }
      if (!inOl) { html += '<ol>'; inOl = true; }
      html += '<li>' + inlineMd(t.replace(/^\d+\.\s*/, '')) + '</li>';
      continue;
    }
    if (inUl) { html += '</ul>'; inUl = false; }
    if (inOl) { html += '</ol>'; inOl = false; }
    html += '<p>' + inlineMd(t) + '</p>';
  }
  if (inUl) html += '</ul>';
  if (inOl) html += '</ol>';
  container.innerHTML = html;

  // 내부 링크에 이벤트 바인딩
  container.querySelectorAll('a[href^="/finlaw/"]').forEach(function(a) {
    a.target = '_blank';
  });
  // 법령 키워드 클릭 → 검색
  container.querySelectorAll('.law-tag').forEach(function(tag) {
    tag.addEventListener('click', function() {
      inputEl.value = tag.textContent;
      sendMessage();
    });
  });
}

function inlineMd(text) {
  let s = escapeHtml(text);
  // 볼드
  s = s.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
  // 코드
  s = s.replace(/`(.*?)`/g, '<code>$1</code>');
  // URL 링크
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  // bare URL
  s = s.replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank">$1</a>');
  // /finlaw/detail/xxx/ 내부 링크
  s = s.replace(/(\/finlaw\/detail\/\d+\/)/g, '<a href="$1" target="_blank">$1</a>');
  return s;
}

// 검색
async function searchILIKE(query) {
  const kw = '%' + query + '%';
  const r = {laws:[], articles:[], precedents:[], interpretations:[]};
  try {
    const [lawsR, artR, precR] = await Promise.all([
      fetch(SUPABASE_URL + '/rest/v1/laws?or=(name.ilike.' + encodeURIComponent(kw) + ',amendment_reason.ilike.' + encodeURIComponent(kw) + ')&select=law_id,name,ministry,law_type,amendment_reason&limit=3', {headers:SB_HDR}).then(x=>x.json()),
      fetch(SUPABASE_URL + '/rest/v1/articles?or=(article_title.ilike.' + encodeURIComponent(kw) + ',content.ilike.' + encodeURIComponent(kw) + ')&select=id,law_id,article_no,article_title,content&limit=5', {headers:SB_HDR}).then(x=>x.json()),
      fetch(SUPABASE_URL + '/rest/v1/precedents?or=(case_name.ilike.' + encodeURIComponent(kw) + ',summary.ilike.' + encodeURIComponent(kw) + ')&select=prec_id,case_name,court,decision_date,summary&limit=3', {headers:SB_HDR}).then(x=>x.json()),
    ]);
    r.laws = lawsR||[]; r.articles = artR||[]; r.precedents = precR||[];
  } catch(e) { console.error(e); }
  return r;
}

async function searchSupabase(query) {
  const headers = {'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Content-Type':'application/json'};
  const r = {laws:[], articles:[], precedents:[], interpretations:[]};
  try {
    const [lawsR,artR,precR,interpR] = await Promise.all([
      fetch(SUPABASE_URL+'/rest/v1/rpc/search_laws',{method:'POST',headers,body:JSON.stringify({query,match_count:3})}).then(x=>x.json()).catch(()=>[]),
      fetch(SUPABASE_URL+'/rest/v1/rpc/search_articles',{method:'POST',headers,body:JSON.stringify({query,match_count:5})}).then(x=>x.json()).catch(()=>[]),
      fetch(SUPABASE_URL+'/rest/v1/rpc/search_precedents',{method:'POST',headers,body:JSON.stringify({query,match_count:3})}).then(x=>x.json()).catch(()=>[]),
      fetch(SUPABASE_URL+'/rest/v1/rpc/search_interpretations',{method:'POST',headers,body:JSON.stringify({query,match_count:3})}).then(x=>x.json()).catch(()=>[]),
    ]);
    r.laws=lawsR; r.articles=artR; r.precedents=precR; r.interpretations=interpR;
  } catch(e) { console.error(e); }
  const total = (r.laws?.length||0)+(r.articles?.length||0)+(r.precedents?.length||0)+(r.interpretations?.length||0);
  if (total === 0) {
    const ilike = await searchILIKE(query);
    r.laws=ilike.laws; r.articles=ilike.articles; r.precedents=ilike.precedents;
  }
  return r;
}

function buildContext(ctx) {
  let parts = [];
  if (ctx.laws?.length) {
    parts.push('## 관련 법령');
    ctx.laws.forEach(function(l) {
      parts.push('- ' + (l.name||'') + ' (law_id:' + (l.law_id||'') + ', ' + (l.ministry||'') + ')');
      if (l.amendment_reason) parts.push('  개정이유: ' + String(l.amendment_reason).slice(0,300));
    });
  }
  if (ctx.articles?.length) {
    parts.push('\n## 관련 조문');
    ctx.articles.forEach(function(a) {
      var lawInfo = a.law_id ? ' [law_id:'+a.law_id+']' : '';
      var no = a.article_no ? '제'+a.article_no+'조 ' : '';
      parts.push('- ' + no + (a.article_title||'') + lawInfo + ': ' + String(a.content||'').slice(0,1000));
    });
  }
  if (ctx.precedents?.length) {
    parts.push('\n## 관련 판례');
    ctx.precedents.forEach(function(p) {
      parts.push('- [' + (p.court||'') + ' ' + (p.decision_date||'') + '] ' + (p.case_name||''));
      if (p.summary && p.summary !== '-') parts.push('  요지: ' + String(p.summary).slice(0,500));
    });
  }
  if (ctx.interpretations?.length) {
    parts.push('\n## 관련 해석례');
    ctx.interpretations.forEach(function(i) {
      parts.push('- ' + (i.title||''));
      if (i.summary) parts.push('  요지: ' + String(i.summary).slice(0,300));
    });
  }
  return parts.length ? parts.join('\n') : '검색 결과 없음';
}

// 출처 카드 렌더링
function renderSourceCards(botDiv, ctx) {
  var cards = [];
  (ctx.laws||[]).forEach(function(l) {
    var link = l.law_id ? '/finlaw/detail/'+l.law_id+'/' : '#';
    cards.push('<a class="src-card law" href="'+link+'" target="_blank">'+escapeHtml(l.name||'')+'</a>');
  });
  (ctx.articles||[]).forEach(function(a) {
    var link = a.law_id ? '/finlaw/detail/'+a.law_id+'/' : '#';
    var no = a.article_no ? '제'+a.article_no+'조 ' : '';
    cards.push('<a class="src-card" href="'+link+'" target="_blank">'+escapeHtml(no+(a.article_title||''))+'</a>');
  });
  (ctx.precedents||[]).forEach(function(p) {
    var link = p.prec_id ? '/finlaw/cases/'+p.prec_id+'/' : '#';
    cards.push('<a class="src-card prec" href="'+link+'" target="_blank">'+escapeHtml((p.case_name||'').slice(0,30))+'</a>');
  });
  if (cards.length) {
    var div = document.createElement('div');
    div.className = 'src-cards';
    div.innerHTML = '<div class="src-label">참조 자료 (클릭하여 상세 보기)</div>' + cards.join('');
    botDiv.appendChild(div);
  }
}

// 후속 질문 추천
function renderFollowups(botDiv, query) {
  var suggestions = [];
  if (query.includes('보험')) suggestions = ['보험사기 처벌 규정은?', '보험업법 최근 개정 사항'];
  else if (query.includes('자본시장')) suggestions = ['불공정거래 규제 조항은?', '금융투자업 인가 요건'];
  else if (query.includes('전자금융')) suggestions = ['전자금융사고 책임은?', '핀테크 규제 현황'];
  else suggestions = ['관련 법령 최근 개정 사항은?', '실무에서 주의할 점은?'];

  var div = document.createElement('div');
  div.className = 'followups';
  suggestions.forEach(function(s) {
    var btn = document.createElement('button');
    btn.className = 'followup-btn';
    btn.textContent = s;
    btn.addEventListener('click', function() { inputEl.value = s; sendMessage(); });
    div.appendChild(btn);
  });
  botDiv.appendChild(div);
}

const SYSTEM_PROMPT = '당신은 한국 금융법령 전문 AI 어시스턴트입니다.\n\n' +
'역할: 금융법령 139건, 조문 3,893건, 판례 526건, 해석례 193건에 대한 질문에 정확하게 답변합니다.\n' +
'반드시 제공된 컨텍스트(검색 결과)를 근거로 답변하세요.\n\n' +
'답변 규칙:\n' +
'1. 법조문 인용 시 법령명과 조문 번호를 명시하세요.\n' +
'2. 관련 법령 상세: /finlaw/detail/{law_id}/ 형태로 링크를 제공하세요.\n' +
'3. 원본 법령: https://www.law.go.kr 법제처 링크를 안내하세요.\n' +
'4. 이전 대화 맥락이 있으면 이어서 답변하세요.\n' +
'5. 금융법령 범위 밖 질문에는 "금융법령 AI 분석 범위 밖입니다. 법제처(https://www.law.go.kr)에서 확인하세요."라고 안내하세요.\n' +
'6. 컨텍스트에 없는 내용은 추측하지 마세요.\n' +
'답변은 마크다운(###, -, 1., **볼드**, [링크](url)) 형식으로 작성하세요.\n' +
'법률 자문이 아닌 정보 제공 목적입니다.';

function addMessage(text, type) {
  var div = document.createElement('div');
  div.className = 'msg ' + type;
  if (type === 'bot') renderBotContent(div, text);
  else div.textContent = text;
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function showLoading() {
  var div = document.createElement('div');
  div.className = 'msg-loading'; div.id = 'loading';
  div.innerHTML = '<span>검색 중</span>...';
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}
function hideLoading() { var el = document.getElementById('loading'); if (el) el.remove(); }

function newChat() {
  chatHistory = [];
  lastSearchCtx = null;
  messagesEl.innerHTML = '';
  introEl.style.display = '';
  topbarEl.style.display = 'none';
}

async function sendMessage() {
  var q = inputEl.value.trim();
  if (!q) return;

  introEl.style.display = 'none';
  topbarEl.style.display = 'flex';
  addMessage(q, 'user');
  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;
  showLoading();

  chatHistory.push({role:'user', text:q});

  // 약칭 확장 + 검색
  var expanded = expandQuery(q);
  var ctx = await searchSupabase(expanded);
  lastSearchCtx = ctx;
  var contextText = buildContext(ctx);

  // 대화 맥락 구성
  var contextQuestion = q;
  if (chatHistory.length > 1) {
    var recent = chatHistory.slice(-6);
    var parts = [];
    for (var i = 0; i < recent.length - 1; i++) {
      parts.push((recent[i].role === 'user' ? '[질문] ' : '[답변] ') + recent[i].text.slice(0, 500));
    }
    parts.push('[현재 질문] ' + q);
    contextQuestion = '이전 대화 맥락:\n' + parts.join('\n') + '\n\n위 맥락을 참고하여 현재 질문에 답변하세요.';
  }

  try {
    var r = await fetch(LLM_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question: contextQuestion, stream: true}),
    });

    hideLoading();

    if (!r.ok) {
      addMessage('응답 오류가 발생했습니다. 잠시 후 다시 시도해주세요.', 'bot');
    } else {
      var botDiv = document.createElement('div');
      botDiv.className = 'msg bot';
      messagesEl.appendChild(botDiv);
      var fullText = '';

      var reader = r.body.getReader();
      var decoder = new TextDecoder();
      var buffer = '';

      while (true) {
        var result = await reader.read();
        if (result.done) break;
        buffer += decoder.decode(result.value, {stream: true});
        var lines = buffer.split('\n');
        buffer = lines.pop();
        for (var j = 0; j < lines.length; j++) {
          if (!lines[j].startsWith('data: ')) continue;
          var payload = lines[j].slice(6).trim();
          if (payload === '[DONE]') continue;
          try {
            var obj = JSON.parse(payload);
            if (obj.chunk) {
              fullText += obj.chunk;
              renderBotContent(botDiv, fullText);
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          } catch(e) {}
        }
      }

      chatHistory.push({role:'bot', text:fullText});

      // 출처 카드 + 후속 질문
      renderSourceCards(botDiv, ctx);
      renderFollowups(botDiv, q);
    }
  } catch(e) {
    hideLoading();
    addMessage('네트워크 오류가 발생했습니다. 인터넷 연결을 확인해주세요.', 'bot');
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

function askExample(btn) { inputEl.value = btn.textContent; sendMessage(); }

inputEl.addEventListener('keydown', function(e) {
  if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
    e.preventDefault();
    sendMessage();
  }
});

// URL ?q= 자동 질문
var initQ = new URLSearchParams(location.search).get('q');
if (initQ) { inputEl.value = initQ; sendMessage(); }
</script>
