<script>
const API_URL = 'https://govbrief-api.vercel.app/api/mylaw';
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('send');
const introEl = document.getElementById('intro');

function escapeHtml(value) {
  return String(value ?? '')
    .replaceAll('&', '&amp;')
    .replaceAll('<', '&lt;')
    .replaceAll('>', '&gt;')
    .replaceAll('"', '&quot;')
    .replaceAll("'", '&#39;');
}

function appendInlineMarkdown(parent, text) {
  const source = String(text ?? '');
  const re = /(\*\*.*?\*\*|`.*?`)/g;
  let last = 0;
  source.replace(re, (match, _g, offset) => {
    if (offset > last) parent.appendChild(document.createTextNode(source.slice(last, offset)));
    if (match.startsWith('**') && match.endsWith('**')) {
      const strong = document.createElement('strong');
      strong.textContent = match.slice(2, -2);
      parent.appendChild(strong);
    } else if (match.startsWith('`') && match.endsWith('`')) {
      const code = document.createElement('code');
      code.textContent = match.slice(1, -1);
      parent.appendChild(code);
    } else {
      parent.appendChild(document.createTextNode(match));
    }
    last = offset + match.length;
    return match;
  });
  if (last < source.length) parent.appendChild(document.createTextNode(source.slice(last)));
}

function renderBotContent(container, text) {
  container.textContent = '';
  const lines = String(text ?? '').split('\n');
  let currentPara = null;
  let currentList = null;

  const closeBlocks = () => {
    currentPara = null;
    currentList = null;
  };

  lines.forEach(line => {
    const trimmed = line.trim();
    if (!trimmed) {
      closeBlocks();
      return;
    }
    if (trimmed.startsWith('### ')) {
      closeBlocks();
      const h3 = document.createElement('h3');
      h3.textContent = trimmed.slice(4);
      container.appendChild(h3);
      return;
    }
    if (/^\d+\.\s/.test(trimmed) || trimmed.startsWith('- ')) {
      if (!currentList) {
        currentList = document.createElement('ul');
        container.appendChild(currentList);
      }
      const li = document.createElement('li');
      appendInlineMarkdown(li, trimmed.replace(/^\d+\.\s/, '').replace(/^- /, ''));
      currentList.appendChild(li);
      currentPara = null;
      return;
    }
    if (currentList) currentList = null;
    if (!currentPara) {
      currentPara = document.createElement('p');
      container.appendChild(currentPara);
    } else {
      currentPara.appendChild(document.createElement('br'));
    }
    appendInlineMarkdown(currentPara, trimmed);
  });
}

function addMessage(text, type) {
  const div = document.createElement('div');
  div.className = 'msg ' + type;
  if (type === 'bot') {
    renderBotContent(div, text);
  } else {
    div.textContent = text;
  }
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
  return div;
}

function showLoading() {
  const div = document.createElement('div');
  div.className = 'msg-loading';
  div.id = 'loading';
  const span = document.createElement('span');
  span.textContent = '관련 법률을 찾고 있습니다';
  div.appendChild(span);
  div.appendChild(document.createTextNode('...'));
  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function hideLoading() {
  const el = document.getElementById('loading');
  if (el) el.remove();
}

async function sendMessage() {
  const q = inputEl.value.trim();
  if (!q) return;

  introEl.style.display = 'none';
  addMessage(q, 'user');
  inputEl.value = '';
  sendBtn.disabled = true;
  showLoading();

  try {
    const r = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: q }),
    });

    hideLoading();

    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      addMessage('죄송합니다. 오류가 발생했습니다: ' + (err.error || r.statusText), 'bot');
    } else {
      const botDiv = document.createElement('div');
      botDiv.className = 'msg bot';
      messagesEl.appendChild(botDiv);
      let fullText = '';
      let sources = {};

      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = line.slice(6).trim();
          if (payload === '[DONE]') continue;
          try {
            const obj = JSON.parse(payload);
            if (obj.sources) sources = obj.sources;
            if (obj.chunk) {
              fullText += obj.chunk;
              renderBotContent(botDiv, fullText);
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          } catch (e) {}
        }
      }

      const srcCount = (sources.laws||0) + (sources.articles||0) + (sources.precedents||0) + (sources.interpretations||0);
      if (srcCount > 0) {
        const srcDiv = document.createElement('div');
        srcDiv.className = 'msg-sources';
        srcDiv.textContent = '참조: 법령 ' + (sources.laws||0) + '건, 조문 ' + (sources.articles||0) + '건, 판례 ' + (sources.precedents||0) + '건';
        botDiv.appendChild(srcDiv);
      }
    }
  } catch (e) {
    hideLoading();
    addMessage('죄송합니다. 오류가 발생했습니다: ' + e.message, 'bot');
  }

  sendBtn.disabled = false;
  inputEl.focus();
}

function askExample(btn) {
  inputEl.value = btn.textContent;
  sendMessage();
}

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.isComposing) sendMessage();
});
</script>
