<script>
(function(){
  var ua = navigator.userAgent;
  var isMobileUA = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(ua);
  if (isMobileUA) document.documentElement.classList.add('is-mobile');
})();
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;word-break:keep-all}
:root{--a:#d96c2c;--al:rgba(217,108,44,.06);--bg:#f7f7f5;--s:#fff;--s2:#fafaf8;--b:#dcdcd8;--bl:#ededea;--t:#1a1a1a;--t2:#555;--t3:#888;--m:#bbb;--serif:'Gowun Batang',serif;--sans:'Wanted Sans Variable',sans-serif;--mono:'JetBrains Mono',monospace}
body{background:var(--bg);color:var(--t);font-family:var(--sans);font-size:15px;line-height:1.6;min-width:1120px}
.is-mobile body{min-width:0;font-size:14px;padding-bottom:68px}
.hdr{background:#fff;border-bottom:1px solid var(--b);height:64px;display:flex;align-items:center;padding:0 32px;position:sticky;top:0;z-index:100}
.hdr-logo{font-family:var(--serif);font-size:24px;font-weight:700;color:var(--t);text-decoration:none;margin-right:44px}
.hdr-nav{display:flex;gap:6px;flex:1}
.hdr-nav a{font-size:15px;font-weight:600;color:var(--t2);text-decoration:none;padding:10px 16px;border-radius:6px}
.hdr-nav a:hover{background:var(--bl)}
.hdr-nav a.on{color:var(--a);background:var(--al);font-weight:700}
.hdr-nav .lbl-short{display:none}
.is-mobile .hdr{height:52px;padding:0 12px}
.is-mobile .hdr-logo{font-size:17px;margin-right:8px}
.is-mobile .hdr-nav a{font-size:12px;padding:7px 8px}
.is-mobile .hdr-nav .lbl-full{display:none}
.is-mobile .hdr-nav .lbl-short{display:inline}
.shell{max-width:1080px;margin:0 auto;padding:20px 16px 40px}
.panel{background:#fff;border:1px solid var(--b);border-radius:8px;overflow:hidden;margin-bottom:16px}
.panel-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px}
.panel-title{font-family:var(--serif);font-size:20px;font-weight:700}
.panel-title .num{font-family:var(--mono);font-size:13px;color:var(--t3);font-weight:400;margin-left:6px}
.panel-more{font-size:13px;color:var(--t3);text-decoration:none;font-weight:600}
.panel-more:hover{color:var(--a)}
.back-link{display:inline-block;font-size:13px;color:var(--t3);text-decoration:none;font-weight:600;margin-bottom:16px}
.back-link:hover{color:var(--a)}
.item-row{display:flex;align-items:flex-start;gap:10px;padding:12px 20px;border-top:1px dashed var(--bl);text-decoration:none;color:var(--t)}
.item-row:hover{background:var(--al)}
.item-row:first-child{border-top:none}
.item-tag{font-family:var(--mono);font-size:9px;font-weight:700;padding:3px 6px;border-radius:3px;flex-shrink:0;margin-top:2px;white-space:nowrap}
.item-body{flex:1;min-width:0}
.item-title{font-size:14px;font-weight:600;line-height:1.4;margin-bottom:2px}
.item-meta{font-size:11px;color:var(--t3)}
.item-link{font-size:11px;color:var(--a);text-decoration:none;font-weight:600;flex-shrink:0}
.footer{max-width:1080px;margin:20px auto 0;padding:24px 16px;text-align:center;color:var(--t3);border-top:1px solid var(--bl)}
.footer-motto{font-family:var(--serif);font-size:14px;color:var(--t2)}
.footer-site{font-family:var(--mono);font-size:11px;color:var(--t3);margin-top:4px}
.bnav{display:none}
.is-mobile .bnav{display:grid;grid-template-columns:repeat(4,1fr);position:fixed;bottom:0;left:0;right:0;z-index:200;background:#fff;border-top:1px solid var(--b);padding:8px 0 calc(10px + env(safe-area-inset-bottom))}
.bnav a{display:flex;flex-direction:column;align-items:center;gap:3px;text-decoration:none;color:var(--t3);font-size:10.5px;font-weight:600;padding:4px 0}
.bnav a.on{color:var(--a)}
</style>
</head>
<body>

  </nav>

  <a class="item-row" href="/regulation/realestate/issues/capital-gains/">

    <span class="item-link">상세 &#8594;</span>
  </a>

    <span class="item-link">상세 &#8594;</span>
  </a>
</section>
</div>
<footer class="footer">

  <div class="footer-site">govbrief.kr</div>
</footer>
