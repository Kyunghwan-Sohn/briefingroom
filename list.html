<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>브리핑룸 — 정부 보도자료</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=Pretendard:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #f5f4f0;
  --bg2:      #eceae5;
  --surface:  #ffffff;
  --border:   #e0ddd7;
  --border2:  #ccc9c2;
  --text:     #1c1b18;
  --text2:    #4a4844;
  --muted:    #96938c;
  --accent:   #2f54eb;
  --accent-l: #eef0fd;
  --c-fin:    #2f54eb;
  --c-soc:    #16a34a;
  --c-ind:    #d97706;
  --c-dip:    #dc2626;
  --c-adm:    #7c3aed;
  --serif:    'Noto Serif KR', serif;
  --sans:     'Pretendard', sans-serif;
  --mono:     'DM Mono', monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 1px 1px,var(--border) 1px,transparent 0);background-size:24px 24px;opacity:.5;pointer-events:none;z-index:0}

/* 사이드바 */
.sidebar{position:fixed;top:0;left:0;width:216px;height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10;overflow-y:auto}
.sb-top{padding:18px 14px 14px;border-bottom:1px solid var(--border)}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;margin-bottom:14px}
.logo-mark{width:30px;height:30px;background:var(--text);border-radius:7px;display:grid;place-items:center;font-size:15px;flex-shrink:0}
.logo-text{font-family:var(--serif);font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.date-nav{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;gap:8px}
.date-nav-label{flex:1;font-family:var(--mono);font-size:12px;color:var(--text2)}
.date-arrow{background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px;padding:1px 3px;border-radius:4px;transition:all .12s}
.date-arrow:hover{color:var(--text);background:var(--bg2)}
.sb-section{padding:10px 6px;border-bottom:1px solid var(--border)}
.sb-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1.3px;text-transform:uppercase;padding:0 6px;margin-bottom:4px}
.f-item{display:flex;align-items:center;justify-content:space-between;padding:7px 8px;border-radius:7px;cursor:pointer;transition:background .1s;user-select:none}
.f-item:hover{background:var(--bg2)}
.f-item.active{background:var(--accent-l)}
.f-left{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text2)}
.f-item.active .f-left{color:var(--text);font-weight:500}
.f-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.f-cnt{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--bg2);padding:1px 6px;border-radius:8px}
.f-item.active .f-cnt{background:rgba(47,84,235,.12);color:var(--accent)}
.sb-bottom{margin-top:auto;padding:10px 6px;border-top:1px solid var(--border)}
.sb-nav{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--muted);text-decoration:none;transition:all .12s}
.sb-nav:hover{color:var(--text2);background:var(--bg2)}

/* 메인 */
.main{margin-left:216px;flex:1;position:relative;z-index:1;min-height:100vh}
.topbar{position:sticky;top:0;z-index:5;background:rgba(245,244,240,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0 24px;height:50px;display:flex;align-items:center;justify-content:space-between;gap:16px}
.search-wrap{flex:1;max-width:340px;position:relative}
.search-ico{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none}
.search-in{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 30px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none;transition:all .15s}
.search-in::placeholder{color:var(--muted)}
.search-in:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(47,84,235,.1)}
.topbar-right{display:flex;align-items:center;gap:8px}
.view-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:7px;overflow:hidden}
.v-btn{padding:6px 10px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;transition:all .12s}
.v-btn.active{background:var(--text);color:#fff}
.sort-sel{background:var(--surface);border:1px solid var(--border);border-radius:7px;padding:6px 10px;font-family:var(--mono);font-size:11px;color:var(--text2);outline:none;cursor:pointer;appearance:none}

/* 콘텐츠 */
.content{padding:22px 24px}
.page-hdr{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:20px}
.page-title{font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:-.5px;color:var(--text)}
.page-sub{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px}
.total-badge{font-family:var(--mono);font-size:12px;color:var(--accent);background:var(--accent-l);border:1px solid rgba(47,84,235,.2);padding:4px 12px;border-radius:20px}

/* 로딩 */
.loading{text-align:center;padding:60px 0;color:var(--muted)}
.loading-spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

/* 카드 그리드 */
.cat-block{margin-bottom:28px}
.cat-divider{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.cat-divider-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}
.cat-divider-label{font-family:var(--serif);font-size:15px;font-weight:600;color:var(--text)}
.cat-divider-line{flex:1;height:1px;background:var(--border)}
.cat-divider-info{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap}
.cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.cards-grid.list-view{grid-template-columns:1fr;gap:4px}
.more-btn{grid-column:1/-1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;background:var(--surface);border:1px dashed var(--border2);border-radius:10px;cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--muted);transition:all .15s}
.more-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l)}

/* 카드 */
.press-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;transition:all .15s;position:relative;animation:fadeUp .3s ease both;border-left:3px solid var(--card-color,var(--accent))}
.press-card:hover{box-shadow:0 3px 16px rgba(0,0,0,.1);transform:translateY(-1px)}
.list-view .press-card{border-left:none;display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:8px}
.list-view .card-body{flex:1;min-width:0}
.list-view .card-actions{flex-shrink:0;margin-top:0}
.list-view .card-title{font-size:13px;-webkit-line-clamp:1}
.list-view .card-summary{display:none}
.list-view .card-meta{margin-top:2px}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.m-badge{font-family:var(--mono);font-size:10px;font-weight:500;padding:2px 8px;border-radius:5px}
.card-time{font-family:var(--mono);font-size:10px;color:var(--muted)}
.card-title{font-size:13.5px;font-weight:500;line-height:1.5;color:var(--text);margin-bottom:7px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-summary{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:10px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;align-items:center;gap:10px;margin-top:8px}
.card-meta-i{font-family:var(--mono);font-size:10px;color:var(--muted);display:flex;align-items:center;gap:4px}
.card-actions{display:flex;gap:5px;margin-top:10px}
.c-btn{display:flex;align-items:center;gap:4px;padding:5px 10px;border-radius:6px;font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .12s;text-decoration:none;border:1px solid var(--border);color:var(--muted);background:none}
.c-btn:hover{color:var(--text);border-color:var(--border2);background:var(--bg2)}
.c-btn.primary{background:var(--text);color:#fff;border-color:var(--text)}
.c-btn.primary:hover{background:var(--accent);border-color:var(--accent)}

/* 상세 패널 */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:20;backdrop-filter:blur(3px)}
.overlay.open{display:block}
.detail{position:fixed;top:0;right:-500px;width:480px;height:100vh;background:var(--surface);border-left:1px solid var(--border);z-index:21;overflow-y:auto;transition:right .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.detail.open{right:0}
.detail-hdr{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;z-index:1}
.d-close{width:28px;height:28px;border-radius:7px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;color:var(--muted);font-size:14px;display:grid;place-items:center;transition:all .12s}
.d-close:hover{color:var(--text);background:var(--bg)}
.detail-body{padding:20px;flex:1}
.d-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:6px;margin-bottom:12px}
.d-title{font-family:var(--serif);font-size:19px;font-weight:700;letter-spacing:-.5px;line-height:1.4;margin-bottom:16px;color:var(--text)}
.d-meta{display:flex;flex-wrap:wrap;gap:16px;padding:12px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:20px}
.d-meta-i{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:2px}
.d-meta-i strong{color:var(--text2);font-weight:500}
.d-sec-label{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.d-sec-label::before{content:'';width:12px;height:1.5px;background:var(--accent)}
.d-summary{font-size:13.5px;line-height:1.8;color:var(--text2);background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:18px}
.d-kws{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:20px}
.kw{font-family:var(--mono);font-size:10px;color:var(--text2);background:var(--bg2);border:1px solid var(--border);padding:3px 9px;border-radius:4px}
.d-actions{display:flex;gap:8px}
.d-btn{flex:1;padding:10px 8px;border-radius:8px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;text-align:center;text-decoration:none;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.d-btn.primary{background:var(--text);color:#fff;border:none}
.d-btn.primary:hover{background:var(--accent);box-shadow:0 3px 12px rgba(47,84,235,.25)}
.d-btn.sec{background:var(--bg2);color:var(--text2);border:1px solid var(--border)}
.d-btn.sec:hover{color:var(--text);border-color:var(--border2)}

/* 빈 상태 */
.empty{text-align:center;padding:50px 0;color:var(--muted);grid-column:1/-1}
.empty-icon{font-size:28px;margin-bottom:10px;opacity:.5}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

@media(max-width:768px){
  .sidebar{display:none}
  .main{margin-left:0}
  .cards-grid{grid-template-columns:1fr}
  .detail{width:100%;right:-100%}
}
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sb-top">
    <a class="logo" href="index.html">
      <div class="logo-mark">📋</div>
      <span class="logo-text">브리핑룸</span>
    </a>
    <div class="date-nav">
      <button class="date-arrow" onclick="changeDate(-1)">◀</button>
      <span class="date-nav-label" id="date-label"></span>
      <button class="date-arrow" onclick="changeDate(1)">▶</button>
    </div>
  </div>

  <div class="sb-section">
    <div class="f-item active" onclick="setFilter('all',this)">
      <div class="f-left"><div class="f-dot" style="background:var(--text)"></div>전체</div>
      <span class="f-cnt" id="cnt-all">0</span>
    </div>
  </div>

  <div class="sb-section">
    <div class="sb-label">분야</div>
    <div class="f-item" onclick="setFilter('금융경제',this)">
      <div class="f-left"><div class="f-dot" style="background:var(--c-fin)"></div>금융·경제</div>
      <span class="f-cnt" id="cnt-금융경제">0</span>
    </div>
    <div class="f-item" onclick="setFilter('사회복지',this)">
      <div class="f-left"><div class="f-dot" style="background:var(--c-soc)"></div>사회·복지</div>
      <span class="f-cnt" id="cnt-사회복지">0</span>
    </div>
    <div class="f-item" onclick="setFilter('산업기술',this)">
      <div class="f-left"><div class="f-dot" style="background:var(--c-ind)"></div>산업·기술</div>
      <span class="f-cnt" id="cnt-산업기술">0</span>
    </div>
    <div class="f-item" onclick="setFilter('외교안보',this)">
      <div class="f-left"><div class="f-dot" style="background:var(--c-dip)"></div>외교·안보</div>
      <span class="f-cnt" id="cnt-외교안보">0</span>
    </div>
    <div class="f-item" onclick="setFilter('행정법제',this)">
      <div class="f-left"><div class="f-dot" style="background:var(--c-adm)"></div>행정·법제</div>
      <span class="f-cnt" id="cnt-행정법제">0</span>
    </div>
  </div>

  <div class="sb-section" id="ministry-sb" style="flex:1">
    <div class="sb-label">부처별</div>
  </div>

  <div class="sb-bottom">
    <a class="sb-nav" href="subscribe.html">⚙ 구독 설정</a>
  </div>
</aside>

<main class="main">
  <div class="topbar">
    <div class="search-wrap">
      <span class="search-ico">🔍</span>
      <input class="search-in" type="text" id="search-in" placeholder="보도자료 검색..." oninput="handleSearch(this.value)">
    </div>
    <div class="topbar-right">
      <div class="view-toggle">
        <button class="v-btn active" onclick="setView('grid',this)" title="그리드">⊞</button>
        <button class="v-btn" onclick="setView('list',this)" title="리스트">☰</button>
      </div>
    </div>
  </div>

  <div class="content">
    <div class="page-hdr">
      <div>
        <div class="page-title" id="page-title">보도자료</div>
        <div class="page-sub" id="page-sub"></div>
      </div>
      <span class="total-badge" id="total-badge">0건</span>
    </div>
    <div id="main-content">
      <div class="loading">
        <div class="loading-spinner"></div>
        <div>데이터 불러오는 중...</div>
      </div>
    </div>
  </div>
</main>

<div class="overlay" id="overlay" onclick="closeDetail()"></div>
<div class="detail" id="detail">
  <div class="detail-hdr">
    <span id="d-hdr-ministry" style="font-family:var(--mono);font-size:11px;color:var(--muted)"></span>
    <button class="d-close" onclick="closeDetail()">✕</button>
  </div>
  <div class="detail-body">
    <div class="d-badge" id="d-badge"></div>
    <div class="d-title" id="d-title"></div>
    <div class="d-meta" id="d-meta"></div>
    <div class="d-sec-label">AI 요약</div>
    <div class="d-summary" id="d-summary"></div>
    <div class="d-kws" id="d-kws"></div>
    <div class="d-actions">
      <a class="d-btn primary" id="d-src" href="#" target="_blank">↗ 원문 보기</a>
      <a class="d-btn sec" id="d-wp" href="#" target="_blank">📄 상세 글</a>
    </div>
  </div>
</div>

<script>
// ── 설정 ──────────────────────────────────────────────
const WP_API  = 'https://hotclipfolio.com/wp-json/wp/v2';
const PER_PAGE = 50;

const CAT_COLOR = {
  '금융경제': 'var(--c-fin)', '사회복지': 'var(--c-soc)',
  '산업기술': 'var(--c-ind)', '외교안보': 'var(--c-dip)',
  '행정법제': 'var(--c-adm)',
};
const CAT_BG = {
  '금융경제': 'rgba(47,84,235,.08)', '사회복지': 'rgba(22,163,74,.08)',
  '산업기술': 'rgba(217,119,6,.08)', '외교안보': 'rgba(220,38,38,.08)',
  '행정법제': 'rgba(124,58,237,.08)',
};
const CAT_NAMES = {
  '금융경제': '금융·경제', '사회복지': '사회·복지',
  '산업기술': '산업·기술', '외교안보': '외교·안보',
  '행정법제': '행정·법제',
};
const CAT_ORDER = ['금융경제','사회복지','산업기술','외교안보','행정법제'];

// ── 상태 ──────────────────────────────────────────────
let allItems   = [];
let curFilter  = 'all';
let curView    = 'grid';
let curSearch  = '';
let curDate    = new Date();
let expanded   = {};
let catIdMap   = {};  // name → id
let catNameMap = {}; // id → name

// ── 날짜 유틸 ─────────────────────────────────────────
function fmtDate(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
function fmtDateKo(d) {
  const days = ['일','월','화','수','목','금','토'];
  return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`;
}

function changeDate(dir) {
  curDate.setDate(curDate.getDate() + dir);
  document.getElementById('date-label').textContent = fmtDate(curDate);
  loadPosts();
}

// ── WP API 카테고리 로드 ──────────────────────────────
async function loadCategories() {
  try {
    const r = await fetch(`${WP_API}/categories?per_page=50`);
    const cats = await r.json();
    cats.forEach(c => {
      catIdMap[c.name]  = c.id;
      catNameMap[c.id]  = c.name;
    });
  } catch(e) { console.warn('카테고리 로드 실패', e); }
}

// ── WP API 포스트 로드 ────────────────────────────────
async function loadPosts() {
  document.getElementById('main-content').innerHTML =
    '<div class="loading"><div class="loading-spinner"></div><div>데이터 불러오는 중...</div></div>';

  const dateStr = fmtDate(curDate);
  document.getElementById('date-label').textContent = dateStr;
  document.getElementById('page-title').textContent =
    `${curDate.getMonth()+1}월 ${curDate.getDate()}일 보도자료`;
  document.getElementById('page-sub').textContent = fmtDateKo(curDate);

  try {
    // 해당 날짜 포스트 수집 (after/before로 날짜 필터)
    const after  = `${dateStr}T00:00:00`;
    const before = `${dateStr}T23:59:59`;
    const url    = `${WP_API}/posts?per_page=${PER_PAGE}&after=${after}&before=${before}&_fields=id,title,content,excerpt,link,categories,date,meta`;

    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const posts = await r.json();

    // 포스트 파싱
    allItems = posts.map(p => parsePost(p));
    render();
    updateSidebar();

  } catch(e) {
    document.getElementById('main-content').innerHTML =
      `<div class="empty"><div class="empty-icon">⚠️</div><div>데이터 로드 실패: ${e.message}</div></div>`;
  }
}

function parsePost(p) {
  // content에서 메타 파싱
  const html    = p.content?.rendered || '';
  const div     = document.createElement('div');
  div.innerHTML = html;

  const source   = div.querySelector('.briefing-source')?.textContent?.replace('🏛 ','') || '';
  const summary  = div.querySelector('.briefing-summary p')?.textContent || '';
  const kwEls    = div.querySelectorAll('.briefing-keywords span');
  const keywords = [...kwEls].map(s => s.textContent.replace('#',''));
  const origUrl  = div.querySelector('.briefing-links a')?.href || p.link;

  // 카테고리명
  const catNames = (p.categories || []).map(id => catNameMap[id]).filter(Boolean);
  const catName  = CAT_ORDER.find(c => catNames.includes(c)) || '행정법제';

  return {
    id:       p.id,
    title:    p.title?.rendered?.replace(/<[^>]+>/g,'') || '',
    source,
    summary,
    keywords,
    origUrl,
    wpUrl:    p.link,
    date:     p.date?.slice(0,10) || '',
    catName,
  };
}

// ── 렌더링 ────────────────────────────────────────────
function getFiltered() {
  let items = allItems;
  if (curFilter !== 'all') {
    items = items.filter(i => i.catName === curFilter || i.source === curFilter);
  }
  if (curSearch) {
    const q = curSearch.toLowerCase();
    items = items.filter(i =>
      i.title.toLowerCase().includes(q) ||
      i.source.toLowerCase().includes(q) ||
      i.summary.toLowerCase().includes(q)
    );
  }
  return items;
}

function render() {
  const items = getFiltered();
  document.getElementById('total-badge').textContent = `${items.length}건`;

  const container = document.getElementById('main-content');
  container.innerHTML = '';

  if (!items.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><div>해당 날짜에 보도자료가 없습니다</div></div>';
    return;
  }

  if (curFilter !== 'all' && curFilter !== '브리핑룸') {
    // 단일 필터
    const grid = document.createElement('div');
    grid.className = `cards-grid${curView==='list'?' list-view':''}`;
    items.forEach((item,i) => grid.appendChild(createCard(item,i)));
    container.appendChild(grid);
  } else {
    // 분야별 그룹
    const grouped = {};
    items.forEach(item => {
      (grouped[item.catName] = grouped[item.catName]||[]).push(item);
    });
    CAT_ORDER.forEach(cat => {
      if (!grouped[cat]?.length) return;
      container.appendChild(buildCatBlock(cat, grouped[cat]));
    });
  }
}

function buildCatBlock(cat, items) {
  const SHOW = 4;
  const isExp = expanded[cat];
  const shown  = isExp ? items : items.slice(0, SHOW);
  const block  = document.createElement('div');
  block.className = 'cat-block';

  const div = document.createElement('div');
  div.className = 'cat-divider';
  div.innerHTML = `
    <div class="cat-divider-dot" style="background:${CAT_COLOR[cat]}"></div>
    <span class="cat-divider-label">${CAT_NAMES[cat]||cat}</span>
    <div class="cat-divider-line"></div>
    <span class="cat-divider-info">${items.length}건</span>`;
  block.appendChild(div);

  const grid = document.createElement('div');
  grid.className = `cards-grid${curView==='list'?' list-view':''}`;
  shown.forEach((item,i) => grid.appendChild(createCard(item,i)));

  const hidden = items.length - SHOW;
  if (!isExp && hidden > 0) {
    const btn = document.createElement('button');
    btn.className = 'more-btn';
    btn.innerHTML = `▾ ${hidden}개 더보기`;
    btn.onclick = () => { expanded[cat]=true; render(); };
    grid.appendChild(btn);
  } else if (isExp && items.length > SHOW) {
    const btn = document.createElement('button');
    btn.className = 'more-btn';
    btn.innerHTML = '▴ 접기';
    btn.onclick = () => { expanded[cat]=false; render(); };
    grid.appendChild(btn);
  }

  block.appendChild(grid);
  return block;
}

function createCard(item, idx) {
  const color = CAT_COLOR[item.catName] || 'var(--accent)';
  const bg    = CAT_BG[item.catName]    || 'rgba(47,84,235,.08)';
  const card  = document.createElement('div');
  card.className = 'press-card';
  card.style.cssText = `--card-color:${color};animation-delay:${Math.min(idx,8)*.04}s`;

  if (curView === 'list') {
    card.innerHTML = `
      <div style="width:76px;flex-shrink:0;text-align:center">
        <span class="m-badge" style="background:${bg};color:${color}">${item.source||'정부'}</span>
      </div>
      <div class="card-body" style="flex:1;min-width:0">
        <div class="card-title" style="-webkit-line-clamp:1;margin-bottom:0">${item.title}</div>
        <div class="card-meta"><span class="card-meta-i">📅 ${item.date}</span></div>
      </div>
      <div class="card-actions" style="margin-top:0">
        <button class="c-btn primary" onclick="event.stopPropagation();openDetail(${item.id})">보기</button>
      </div>`;
  } else {
    card.innerHTML = `
      <div class="card-top">
        <span class="m-badge" style="background:${bg};color:${color}">${item.source||'정부'}</span>
        <span class="card-time">${item.date}</span>
      </div>
      <div class="card-title">${item.title}</div>
      <div class="card-summary">${item.summary}</div>
      <div class="card-meta">
        <span class="card-meta-i">🏷 ${item.keywords.slice(0,2).join(' · ')}</span>
      </div>
      <div class="card-actions">
        <button class="c-btn primary" onclick="event.stopPropagation();openDetail(${item.id})">상세보기</button>
        <a class="c-btn" href="${item.origUrl}" target="_blank" onclick="event.stopPropagation()">↗ 원문</a>
      </div>`;
  }
  card.addEventListener('click', () => openDetail(item.id));
  return card;
}

// ── 상세 패널 ─────────────────────────────────────────
function openDetail(id) {
  const item = allItems.find(i => i.id === id);
  if (!item) return;
  const color = CAT_COLOR[item.catName] || 'var(--accent)';
  const bg    = CAT_BG[item.catName]    || 'rgba(47,84,235,.08)';

  document.getElementById('d-hdr-ministry').textContent = item.source;
  const badge = document.getElementById('d-badge');
  badge.textContent = item.source;
  badge.style.cssText = `background:${bg};color:${color};border:1px solid ${color}44`;
  document.getElementById('d-title').textContent = item.title;
  document.getElementById('d-meta').innerHTML = `
    <div class="d-meta-i"><span>날짜</span><strong>${item.date}</strong></div>
    <div class="d-meta-i"><span>기관</span><strong>${item.source}</strong></div>
    <div class="d-meta-i"><span>분야</span><strong>${CAT_NAMES[item.catName]||item.catName}</strong></div>`;
  document.getElementById('d-summary').textContent = item.summary || '요약 없음';
  document.getElementById('d-kws').innerHTML = item.keywords.map(k=>`<span class="kw"># ${k}</span>`).join('');
  document.getElementById('d-src').href = item.origUrl || '#';
  document.getElementById('d-wp').href  = item.wpUrl  || '#';

  document.getElementById('overlay').classList.add('open');
  document.getElementById('detail').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeDetail() {
  document.getElementById('overlay').classList.remove('open');
  document.getElementById('detail').classList.remove('open');
  document.body.style.overflow = '';
}

// ── 사이드바 카운트 업데이트 ──────────────────────────
function updateSidebar() {
  const items = allItems;
  document.getElementById('cnt-all').textContent = items.length;
  ['금융경제','사회복지','산업기술','외교안보','행정법제'].forEach(cat => {
    const el = document.getElementById(`cnt-${cat}`);
    if (el) el.textContent = items.filter(i => i.catName === cat).length;
  });

  // 부처별
  const sb = document.getElementById('ministry-sb');
  // 기존 f-item 제거 (sb-label 제외)
  [...sb.querySelectorAll('.f-item')].forEach(e => e.remove());
  const mins = [...new Set(items.map(i => i.source))].sort((a,b)=>a.localeCompare(b,'ko'));
  mins.forEach(m => {
    const cnt = items.filter(i => i.source === m).length;
    const catName = items.find(i=>i.source===m)?.catName||'행정법제';
    const el = document.createElement('div');
    el.className = 'f-item';
    el.innerHTML = `
      <div class="f-left">
        <div class="f-dot" style="background:${CAT_COLOR[catName]}"></div>${m}
      </div>
      <span class="f-cnt">${cnt}</span>`;
    el.addEventListener('click', () => setFilter(m, el));
    sb.appendChild(el);
  });
}

function setFilter(cat, el) {
  curFilter = cat;
  document.querySelectorAll('.f-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
  expanded = {};
  render();
}

function setView(v, el) {
  curView = v;
  document.querySelectorAll('.v-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function handleSearch(q) {
  curSearch = q.toLowerCase();
  expanded = {};
  render();
}

// ── 키보드 ────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDetail();
  if (e.key === '/' && !e.target.matches('input,textarea')) {
    e.preventDefault();
    document.getElementById('search-in').focus();
  }
});

// ── 초기화 ────────────────────────────────────────────
(async () => {
  await loadCategories();
  await loadPosts();
})();
</script>
</body>
</html>
