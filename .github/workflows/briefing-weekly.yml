name: briefingroom-weekly

on:
  schedule:
    - cron: '0 16 * * 6'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: briefing-weekly
  cancel-in-progress: false

jobs:
  weekly-summary:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: install
        run: pip install -r requirements.txt

      - name: weekly-summary
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
          RUN_MODE: weekly-summary
        run: python briefing.py

      - name: commit
        run: |
          git config user.name "briefing-bot"
          git config user.email "bot@briefingroom.kr"
          git add data/
          git diff --staged --quiet || git commit -m "weekly-summary $(date +%Y-%m-%d)"
          git push

      - name: notify-failure
        if: failure()
        run: |
          echo "::error::주간 종합 요약 실패"
