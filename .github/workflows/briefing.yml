name: briefingroom-auto

on:
  schedule:
    - cron: '0 9 * * 1-5'
    - cron: '0 16 * * 6'
    - cron: '0 16 * * 0'
  workflow_dispatch:
    inputs:
      mode:
        description: 'daily or weekly'
        required: false
        default: 'auto'
      date:
        description: 'YYYY-MM-DD'
        required: false

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: python-setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: install
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: run
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
          RUN_MODE: ${{ github.event.inputs.mode || 'auto' }}
          RUN_DATE: ${{ github.event.inputs.date || '' }}
        run: python briefing.py

      - name: commit
        run: |
          git config user.name "briefing-bot"
          git config user.email "bot@briefingroom.kr"
          git add -A
          git diff --staged --quiet || git commit -m "auto"
          git push