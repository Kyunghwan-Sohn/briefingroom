name: briefingroom-daily

on:
  schedule:
    - cron: '0 9 * * 1-5'
  workflow_dispatch:
    inputs:
      date:
        description: 'YYYY-MM-DD (특정 날짜 수집)'
        required: false
      sources:
        description: 'comma-separated ministry names or codes (e.g. fsc,moef,금융위원회)'
        required: false

permissions:
  contents: write

concurrency:
  group: briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: python-setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: install
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: run
        env:
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          CRAWL_DELAY_MIN: ${{ vars.CRAWL_DELAY_MIN || '30' }}
          CRAWL_DELAY_MAX: ${{ vars.CRAWL_DELAY_MAX || '90' }}
          RUN_MODE: daily
          RUN_DATE: ${{ github.event.inputs.date || '' }}
          CRAWLER_SOURCES: ${{ github.event.inputs.sources || '' }}
        run: python briefing.py

      - name: commit
        run: |
          git config user.name "briefing-bot"
          git config user.email "bot@briefingroom.kr"
          git add briefing.py briefingroom/ data/ texts/ pdfs/ list.html .github/workflows/briefing.yml
          git diff --staged --quiet || git commit -m "briefing $(date +%Y-%m-%d)"
          git push

      - name: notify-failure
        if: failure()
        run: |
          echo "::error::브리핑룸 크롤링 실패 - $(date +%Y-%m-%d)"
          echo "워크플로우 로그를 확인하세요: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"