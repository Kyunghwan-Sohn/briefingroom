name: briefingroom

on:
  schedule:
    # 월~금 오전: KST 11:40 = UTC 02:40
    - cron: '40 2 * * 1-5'
    # 월~금 오후: KST 18:00 = UTC 09:00
    - cron: '0 9 * * 1-5'
    # 토요일 주간요약: KST 09:00 = UTC 00:00
    - cron: '0 0 * * 6'
    # 일요일 차주일정: KST 17:00 = UTC 08:00
    - cron: '0 8 * * 0'
  workflow_dispatch:
    inputs:
      date:
        description: 'YYYY-MM-DD (특정 날짜 수집)'
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: briefing
  cancel-in-progress: false

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: python-setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('requirements.txt') }}

      - name: install
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: verify-python
        run: python -m compileall briefing.py briefingroom

      - name: run
        env:
          WP_ENABLED: 'false'
          WP_URL: ${{ secrets.WP_URL }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_URL: ${{ secrets.LLM_API_URL }}
          LLM_MODEL: ${{ secrets.LLM_MODEL }}
          PROXY_URL: ${{ secrets.PROXY_URL }}
          CRAWL_DELAY_MIN: ${{ vars.CRAWL_DELAY_MIN || '30' }}
          CRAWL_DELAY_MAX: ${{ vars.CRAWL_DELAY_MAX || '90' }}
          TELEGRAM_ENABLED: 'true'
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RUN_DATE: ${{ github.event.inputs.date || '' }}
          BRIEFING_SESSION: ${{ github.event.schedule == '40 2 * * 1-5' && 'am' || github.event.schedule == '0 9 * * 1-5' && 'pm' || '' }}
        run: python briefing.py

      - name: commit
        run: |
          git config user.name "briefing-bot"
          git config user.email "bot@briefingroom.kr"
          git add briefing.py briefingroom/ data/ feed/ articles/ sitemap.xml .github/workflows/
          git diff --staged --quiet || git commit -m "briefing $(date +%Y-%m-%d) $(date +%H:%M)"
          git pull --rebase origin main || true
          if ! git push; then
            echo "push failed, retrying..."
            sleep 5
            git pull --rebase origin main
            git push
          fi

      - name: notify-failure
        if: failure()
        run: |
          echo "::error::브리핑룸 크롤링 실패 - $(date +%Y-%m-%d %H:%M)"
