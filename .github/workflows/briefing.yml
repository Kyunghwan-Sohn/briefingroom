name: 브리핑룸 자동 수집

on:
  schedule:
    - cron: '0 23 * * *'  # 매일 KST 오전 8시 (UTC 23:00)
  workflow_dispatch:        # 수동 실행 버튼

jobs:
  briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium

      - name: 브리핑룸 실행
        env:
          WP_USER: ${{ secrets.WP_USER }}
          WP_PASS: ${{ secrets.WP_PASS }}
        run: |
          python briefing.py

      - name: 실행 결과 커밋
        run: |
          git config user.name "briefing-bot"
          git config user.email "bot@briefingroom.kr"
          git add -A
          git diff --quiet && git diff --staged --quiet || git commit -m "자동 수집: $(date '+%Y-%m-%d')"
          git push
