<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>페이지를 찾을 수 없습니다 - 브리핑룸</title>
<style>
:root{--bg:#f5f4f0;--surface:#fff;--border:#e0ddd7;--text:#1c1b18;--muted:#96938c;--accent:#2f54eb;--serif:'Noto Serif KR',serif;--sans:'Pretendard',sans-serif;--mono:'DM Mono',monospace}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;align-items:center;justify-content:center}
.wrap{text-align:center;padding:40px}
.code{font-family:var(--mono);font-size:72px;font-weight:700;color:var(--accent);margin-bottom:12px}
.msg{font-family:var(--serif);font-size:20px;color:var(--text);margin-bottom:24px}
.back{display:inline-block;padding:12px 24px;background:var(--accent);color:#fff;text-decoration:none;border-radius:8px;font-size:14px;font-weight:600}
.back:hover{background:#1a3fd4}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <div class="msg">페이지를 찾을 수 없습니다</div>
  <a class="back" href="/">브리핑룸 홈으로</a>
</div>
</body>
</html>
