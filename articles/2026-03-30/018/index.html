      <p>산림청은 2026년 3월 30일 제15회 녹색문학상 작품 공모를 시작하여 산림과 녹색 가치 관련 문학을 장려합니다. 공모를 통해 우수 작품을 발굴·지원할 예정이며, 수상작은 산림 관련 문화콘텐츠로 활용될 예정입니다. 이번 공모는 일반 국민 및 문학인을 대상으로 하여 생태 감수성 확산과 녹색 문화 활성화 효과를 기대합니다.</p>
