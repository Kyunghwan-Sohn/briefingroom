<style>
:root{--bg:#F8F7F4;--bg2:#F0EEE9;--bg3:#E8E5DF;--surface:#fff;--surface2:#FAFAF8;--border:#E2DED8;--border2:#C8C4BC;--border3:#A8A49C;--text:#111110;--text2:#3D3B37;--text3:#6B6860;--muted:#9C9893;--accent:#1A47CC;--accent-h:#1238A8;--accent-l:#EEF1FD;--accent-m:rgba(26,71,204,.12);--c-fin:#1A47CC;--c-soc:#0F6B3A;--c-ind:#9A4A0A;--c-dip:#A31515;--c-adm:#5B20B8;--c-fin-l:#EEF1FD;--c-soc-l:#ECFDF5;--c-ind-l:#FFF7ED;--c-dip-l:#FEF2F2;--c-adm-l:#F5F3FF;--serif:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;--sans:'Pretendard Variable','Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;--mono:'JetBrains Mono',monospace;--sp-1:4px;--sp-2:8px;--sp-3:12px;--sp-4:16px;--sp-5:20px;--sp-6:24px;--sp-8:32px;--r-sm:6px;--r-md:10px;--r-lg:14px;--r-xl:20px;--shadow-1:0 1px 2px rgba(0,0,0,.05);--shadow-2:0 2px 8px rgba(0,0,0,.07),0 1px 2px rgba(0,0,0,.04);--shadow-3:0 4px 16px rgba(0,0,0,.10),0 2px 4px rgba(0,0,0,.06);--shadow-4:0 8px 32px rgba(0,0,0,.14),0 4px 8px rgba(0,0,0,.08);--shadow-modal:0 24px 72px rgba(17,17,16,.22),0 8px 24px rgba(17,17,16,.10);--t-fast:80ms cubic-bezier(.4,0,.2,1);--t-base:150ms cubic-bezier(.4,0,.2,1);--t-slow:250ms cubic-bezier(.4,0,.2,1);--t-spring:300ms cubic-bezier(.34,1.56,.64,1);--mob-h:52px;--mob-tab:48px;--mob-nav:64px;--mob-safe:env(safe-area-inset-bottom,0px)}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 1px 1px,var(--border) 1px,transparent 0);background-size:24px 24px;opacity:.5;pointer-events:none;z-index:0;will-change:transform}
.header{position:sticky;top:0;z-index:10;background:rgba(248,247,244,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 24px;height:56px;display:flex;align-items:center;gap:16px}
.header-center{display:flex;align-items:center;gap:var(--sp-3);margin-left:auto}
.header-date{font-family:var(--mono);font-size:12px;color:var(--text2);white-space:nowrap}
.header-right{display:flex;align-items:center;gap:var(--sp-3)}
.search-wrap-hdr{position:relative;display:flex;align-items:center}
.search-wrap-hdr .search-in{width:180px;padding-left:30px;padding-right:28px;transition:width var(--t-slow),border-color var(--t-base),box-shadow var(--t-base)}
.search-wrap-hdr .search-in:focus{width:260px;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-m)}
.search-kbd{position:absolute;right:8px;background:var(--bg2);border:1px solid var(--border);border-radius:4px;padding:1px 5px;font-family:var(--mono);font-size:10px;color:var(--muted);pointer-events:none;transition:opacity var(--t-base)}
.search-wrap-hdr .search-in:focus~.search-kbd{opacity:0}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;flex-shrink:0}
.logo-mark{width:30px;height:30px;background:var(--text);border-radius:7px;display:grid;place-items:center;font-size:14px}
.logo-text{font-family:var(--serif);font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px}
.header-sub-area{flex:1;max-width:560px;display:flex;align-items:center;gap:10px}
.header-sub-label{font-size:12px;color:var(--text2);white-space:nowrap;font-weight:500}
.header-sub-btn{padding:8px 16px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .15s}
.header-sub-btn:hover{background:#1a3fd4}
.body-wrap{display:flex;flex:1;position:relative;z-index:1;overflow-x:hidden;min-width:0}
.sidebar{position:fixed;top:56px;left:0;width:216px;height:calc(100vh - 56px);background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:8;overflow-y:auto}
.sb-top{padding:14px 12px;border-bottom:1px solid var(--border)}
.date-nav{display:flex;align-items:center;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:7px 10px;gap:8px}
.date-nav-label{flex:1;font-family:var(--mono);font-size:12px;color:var(--text2)}
.date-arrow{background:none;border:none;cursor:pointer;color:var(--muted);font-size:11px;padding:1px 3px;border-radius:4px;transition:all .12s}
.date-arrow:hover{color:var(--text);background:var(--bg2)}
.sb-section{padding:10px 6px;border-bottom:1px solid var(--border)}
.sb-label{font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1.3px;text-transform:uppercase;padding:0 6px;margin-bottom:4px}
.f-item{display:flex;align-items:center;justify-content:space-between;padding:7px 8px;border-radius:7px;cursor:pointer;transition:background .1s;user-select:none}
.f-item:hover{background:var(--bg2)}
.f-item.active{background:var(--accent-l)}
.f-left{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text2)}
.f-item.active .f-left{color:var(--text);font-weight:500}
.f-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.f-cnt{font-family:var(--mono);font-size:10px;color:var(--muted);background:var(--bg2);padding:1px 6px;border-radius:8px}
.f-item.active .f-cnt{background:rgba(47,84,235,.12);color:var(--accent)}
.sb-min-section{padding:10px 6px;flex:1}
.sb-sub{padding:0 0 0 18px;max-height:0;overflow:hidden;transition:max-height .25s ease}
.sb-sub.open{max-height:300px}
.sb-sub .f-item{padding:5px 8px}
.sb-sub .f-left{font-size:11.5px}
.sb-sub .f-dot{width:6px;height:6px}
.fin-toggle{cursor:pointer;position:relative}
.fin-toggle::after{content:'▸';position:absolute;right:8px;font-size:9px;color:var(--muted);transition:transform .2s}
.fin-toggle.expanded::after{transform:rotate(90deg)}
.main{margin-left:216px;flex:1;min-height:calc(100vh - 56px);max-width:calc(100vw - 216px);overflow-x:hidden;min-width:0}
.search-in{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px 6px 28px;font-family:var(--mono);font-size:12px;color:var(--text);outline:none;transition:all .15s}
.search-in::placeholder{color:var(--muted)}
.search-in:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-m)}
.view-toggle{display:flex;background:var(--surface);border:1px solid var(--border);border-radius:7px;overflow:hidden}
.v-btn{padding:5px 9px;background:none;border:none;cursor:pointer;color:var(--muted);font-size:13px;transition:all .12s}
.v-btn.active{background:var(--text);color:#fff}
.content{padding:24px 24px;min-width:0;overflow-x:hidden}
.total-badge{font-family:var(--mono);font-size:12px;color:var(--accent);background:var(--accent-l);border:1px solid var(--accent-m);padding:4px 12px;border-radius:20px;white-space:nowrap;flex-shrink:0}
.loading{text-align:center;padding:60px 0;color:var(--muted)}
.loading-spinner{width:32px;height:32px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.cat-block{margin-bottom:24px;margin-top:8px}
.cat-divider{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.cat-divider-dot{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.cat-divider-label{font-family:var(--serif);font-size:14px;font-weight:600;color:var(--text)}
.cat-divider-line{flex:1;height:1px;background:var(--border)}
.cat-divider-info{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap}
.cards-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;max-width:100%}
.cards-grid.list-view{grid-template-columns:1fr;gap:4px}
.more-btn{grid-column:1/-1;display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;background:var(--surface);border:1px dashed var(--border2);border-radius:10px;cursor:pointer;font-family:var(--mono);font-size:11px;color:var(--muted);transition:all .15s}
.more-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-l)}
.press-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px 16px;cursor:pointer;overflow:hidden;word-break:break-word;transition:all .15s;animation:fadeUp .3s ease both;border-left:3px solid var(--card-color,var(--accent))}
.press-card:hover{box-shadow:0 3px 16px rgba(0,0,0,.1);transform:translateY(-1px)}
.list-view .press-card{border-left:none;display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:8px}
.list-view .card-body{flex:1;min-width:0}
.list-view .card-actions{flex-shrink:0;margin-top:0}
.list-view .card-title{font-size:13px;-webkit-line-clamp:1}
.list-view .card-summary{display:none}
.list-view .card-meta{margin-top:2px}
.card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.m-badge{font-family:var(--mono);font-size:10px;font-weight:500;padding:2px 8px;border-radius:5px}
.card-time{font-family:var(--mono);font-size:10px;color:var(--muted)}
.card-title{font-size:13px;font-weight:500;line-height:1.5;color:var(--text);margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word}
.card-summary{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-summary mark,.d-summary mark{background:none;color:var(--accent);font-weight:600}
.card-meta{display:flex;align-items:center;gap:10px;margin-top:6px}
.card-meta-i{font-family:var(--mono);font-size:10px;color:var(--muted)}
.card-meta-i .kw-tag{color:var(--accent);font-weight:600;background:var(--accent-l);padding:1px 6px;border-radius:3px;margin:0 1px}
.card-actions{display:flex;gap:5px;margin-top:8px}
.c-btn{display:flex;align-items:center;gap:4px;padding:8px 14px;border-radius:6px;min-height:36px;font-family:var(--mono);font-size:10px;cursor:pointer;transition:all .12s;text-decoration:none;border:1px solid var(--border);color:var(--muted);background:none}
.c-btn:hover{color:var(--text);border-color:var(--border2);background:var(--bg2)}
.c-btn.primary{background:var(--text);color:#fff;border-color:var(--text)}
.c-btn.primary:hover{background:var(--accent);border-color:var(--accent)}
.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:20;backdrop-filter:blur(4px)}
.detail-overlay.open{display:block}
.detail{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(.95);width:680px;max-width:92vw;max-height:88vh;background:var(--surface);border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.2);z-index:21;overflow-y:auto;display:flex;flex-direction:column;opacity:0;pointer-events:none;transition:all .25s cubic-bezier(.4,0,.2,1)}
.detail.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.detail-hdr{position:sticky;top:0;background:var(--surface);border-bottom:1px solid var(--border);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;z-index:1}
.d-close{width:44px;height:44px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;color:var(--muted);font-size:16px;display:grid;place-items:center;transition:all .12s}
.d-close:hover{color:var(--text);background:var(--bg)}
.detail-body{padding:20px;flex:1;padding-bottom:calc(var(--mob-nav) + var(--mob-safe) + 20px)}
.d-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:6px;margin-bottom:12px}
.d-title{font-family:var(--serif);font-size:22px;font-weight:700;letter-spacing:-.5px;line-height:1.4;margin-bottom:14px;color:var(--text)}
.d-meta{display:flex;flex-wrap:wrap;gap:14px;padding:12px 0;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:18px}
.d-meta-i{font-family:var(--mono);font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:2px}
.d-meta-i strong{color:var(--text2);font-weight:500}
.d-sec-label{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:1.2px;text-transform:uppercase;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.d-sec-label::before{content:'';width:12px;height:1.5px;background:var(--accent)}
.d-summary{font-size:15px;line-height:1.8;color:var(--text2);background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:18px 20px;margin-bottom:16px}
.d-kws{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:18px}
.kw{font-family:var(--mono);font-size:11px;color:#fff;background:var(--accent);padding:4px 10px;border-radius:4px;font-weight:500}
.d-actions{display:flex;gap:8px}
.d-btn{flex:1;padding:10px 8px;border-radius:8px;font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;text-align:center;text-decoration:none;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:5px}
.d-btn.primary{background:var(--accent);color:#fff;border:none}
.d-btn.primary:hover{background:#1a3fd4}
.d-btn.sec{background:#f0f0ed;color:var(--text);border:1px solid var(--border)}
.d-btn.sec:hover{background:var(--bg2)}

.sub-bar{background:linear-gradient(135deg,#0f172a,#2563eb);border-radius:10px;padding:10px 16px;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.sub-bar-btn{padding:8px 16px;background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.5);border-radius:7px;font-family:var(--sans);font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s;text-decoration:none}
.sub-bar-btn:hover{background:rgba(255,255,255,.28)}
.mobile-date-nav{display:none;align-items:center;justify-content:space-between;background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px;position:sticky;top:56px;z-index:7}
.mob-date-label{font-family:var(--mono);font-size:13px;color:var(--text2);font-weight:500}
.mob-date-arrow{background:var(--bg2);border:1px solid var(--border);border-radius:7px;padding:10px 18px;cursor:pointer;color:var(--text);font-size:13px;min-height:44px;min-width:44px;display:grid;place-items:center}
.mob-filter{display:none;overflow-x:auto;-webkit-overflow-scrolling:touch;background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px;gap:6px;position:sticky;top:100px;z-index:6;scrollbar-width:none;max-width:100vw;width:100%}
.mob-filter::-webkit-scrollbar{display:none}
.mob-filter-btn{flex-shrink:0;padding:10px 16px;border-radius:20px;min-height:44px;border:1.5px solid var(--border);background:var(--surface);font-family:var(--mono);font-size:11px;color:var(--text2);cursor:pointer;transition:all .12s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.mob-filter-btn:hover{border-color:var(--border2);background:var(--bg2)}
.mob-filter-btn.active{background:var(--text);color:#fff;border-color:var(--text)}
.mob-filter-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.mob-filter-btn.active .mob-filter-dot{background:#fff !important}

/* ===== 모바일 전용 컴포넌트 ===== */
.m-header{display:none;position:fixed;top:0;left:0;right:0;height:var(--mob-h);z-index:50;background:rgba(245,244,240,.96);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 12px;align-items:center;gap:8px}
.m-date-chip{display:flex;align-items:center;gap:4px;height:32px;background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:0 12px;font-family:var(--mono);font-size:12px;font-weight:500;color:var(--text2);cursor:pointer;white-space:nowrap}
.m-icon-btn{width:48px;height:48px;min-width:48px;border-radius:10px;background:none;border:none;color:var(--text2);cursor:pointer;display:grid;place-items:center;font-size:16px}
.m-icon-btn:active{background:var(--bg2)}
.m-search-slide{display:none;background:var(--surface);border-bottom:1px solid var(--border);padding:8px 12px}
.m-search-slide.open{display:block}
.m-search-row{display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:0 12px;height:40px}
.m-search-row input{flex:1;background:none;border:none;outline:none;font-family:var(--sans);font-size:14px;color:var(--text);min-width:0}
.m-search-row input::placeholder{color:var(--muted)}
.m-cat-tabs{display:none;position:sticky;z-index:40;background:rgba(245,244,240,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);height:var(--mob-tab)}
.m-cat-tabs[data-active]{display:flex;overflow-x:auto;scrollbar-width:none;padding:0 var(--sp-3);gap:var(--sp-1);align-items:center}
.m-tab{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:0;background:none;border:none;cursor:pointer;min-height:44px;color:var(--muted);position:relative;font-family:var(--sans);-webkit-tap-highlight-color:transparent}
.m-tab.active{color:var(--text)}
.m-tab.active::after{content:'';position:absolute;bottom:0;left:20%;right:20%;height:2px;background:var(--tab-c,var(--text));border-radius:1px 1px 0 0}
.m-tab-dot{width:5px;height:5px;border-radius:50%;background:var(--tab-c,var(--muted))}
.m-tab-label{font-size:14px;font-weight:600;line-height:1}
.m-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:50;height:calc(64px + var(--mob-safe));padding-bottom:var(--mob-safe);background:rgba(255,255,255,.98);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-top:1px solid var(--border);box-shadow:0 -2px 12px rgba(0,0,0,.06);grid-template-columns:repeat(5,1fr);align-items:center}

@media(max-width:768px){

}
@media(min-width:769px){.m-header,.m-cat-tabs,.m-bottom-nav,.m-search-slide{display:none!important}}
@media(min-width:769px) and (max-width:1024px){

}
.mobile-cta{display:none;position:fixed;bottom:0;left:0;right:0;z-index:15;background:linear-gradient(135deg,#0f172a,#1e40af);padding:12px 16px;padding-bottom:max(12px, env(safe-area-inset-bottom));gap:8px;align-items:center;box-shadow:0 -4px 20px rgba(0,0,0,.15)}
.mobile-cta-text{color:rgba(255,255,255,.85);font-size:12px;white-space:nowrap}
.mobile-cta-btn{flex:1;padding:10px;background:rgba(255,255,255,.18);color:#fff;border:1.5px solid rgba(255,255,255,.5);border-radius:8px;font-family:var(--sans);font-size:13px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;text-decoration:none}
.mobile-cta-btn:hover{background:rgba(255,255,255,.28)}
.ministry-sheet{display:none;position:fixed;inset:0;z-index:30;background:rgba(0,0,0,.4);backdrop-filter:blur(4px)}
.ministry-sheet.open{display:flex;align-items:flex-end}
.ministry-sheet-inner{width:100%;max-height:70vh;background:var(--surface);border-radius:16px 16px 0 0;overflow-y:auto;padding-bottom:max(16px, env(safe-area-inset-bottom))}
.ministry-sheet-hdr{position:sticky;top:0;background:var(--surface);padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;border-radius:16px 16px 0 0}
.ministry-sheet-hdr::before{content:'';display:block;width:36px;height:4px;background:var(--border2);border-radius:2px;position:absolute;top:8px;left:50%;transform:translateX(-50%)}
.ministry-sheet-title{font-family:var(--serif);font-size:16px;font-weight:700}
.ministry-sheet-close{width:44px;height:44px;border-radius:10px;background:var(--bg2);border:1px solid var(--border);cursor:pointer;color:var(--muted);font-size:16px;display:grid;place-items:center}
.ministry-sheet-list{padding:8px 12px}
.ministry-sheet-item{display:flex;align-items:center;justify-content:space-between;padding:12px 10px;border-radius:8px;cursor:pointer;min-height:44px}
.ministry-sheet-item:hover{background:var(--bg2)}
.ministry-sheet-item.active{background:var(--accent-l)}
.empty{text-align:center;padding:50px 0;color:var(--muted);grid-column:1/-1}
.empty-icon{font-size:28px;margin-bottom:10px;opacity:.5}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:4px}

/* ===== UI 개선 패치 v3 ===== */

/* 카드 border-left 제거, radius 통일, hover 절제 */
.press-card{border-left:none!important;border-radius:var(--r-md);transition:border-color var(--t-base),box-shadow var(--t-base),background var(--t-fast)}
.press-card:hover{border-color:var(--border2);box-shadow:var(--shadow-2);background:var(--surface2);transform:none}
.press-card:active{background:var(--bg2);box-shadow:var(--shadow-1)}

/* === 일정 달력 === */
.sched-cal{display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--sp-5);margin-bottom:var(--sp-5);overflow:hidden}
.sched-cal.has-data{display:block}
.sched-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-4)}
.sched-title{font-family:var(--serif);font-size:20px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:var(--sp-2)}
.sched-range{font-family:var(--mono);font-size:11px;color:var(--muted)}
.sched-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:var(--sp-2)}
.sched-day{background:var(--bg);border:1px solid var(--border);border-radius:var(--r-md);padding:var(--sp-3);min-height:100px;transition:border-color var(--t-base)}
.sched-day:hover{border-color:var(--border2)}
.sched-day.today{border-color:var(--accent);background:var(--accent-l)}
.sched-day.past{opacity:.55}
.sched-day-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--sp-2)}
.sched-day-num{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text);line-height:1}
.sched-day-dow{font-family:var(--mono);font-size:10px;color:var(--muted);text-transform:uppercase}
.sched-day-cnt{font-family:var(--mono);font-size:9px;color:var(--accent);background:var(--accent-l);padding:1px 6px;border-radius:8px}
.sched-items{display:flex;flex-direction:column;gap:3px}
.sched-item{font-size:11px;color:var(--text2);line-height:1.4;display:flex;gap:4px;align-items:flex-start}
.sched-item-time{font-family:var(--mono);font-size:10px;color:var(--muted);flex-shrink:0;min-width:32px}
.sched-item-src{font-family:var(--mono);font-size:10px;color:var(--accent);flex-shrink:0;max-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sched-item-title{font-size:11px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
.sched-more{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:var(--sp-1);cursor:pointer}
.sched-more:hover{color:var(--accent)}
.sched-link{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:11px;color:var(--accent);text-decoration:none;padding:var(--sp-2) var(--sp-3);border:1px solid var(--accent-m);border-radius:var(--r-sm);margin-top:var(--sp-3);transition:background var(--t-fast)}
.sched-link:hover{background:var(--accent-l)}
@media(max-width:768px){
  .sched-grid{grid-template-columns:1fr;gap:var(--sp-2)}
  .sched-day{min-height:auto;padding:var(--sp-3)}
  .sched-cal{padding:var(--sp-4)}
}

/* 타이포그래피 위계 강화 */
.card-title{font-size:15px;font-weight:700;letter-spacing:-.3px;-webkit-line-clamp:2}
.card-summary{font-size:12.5px;color:var(--text2);-webkit-line-clamp:1}
.card-time,.card-meta-i{font-size:11px}

/* 모든 인터랙티브: 터치 최적화 */
button,[role="button"],.press-card,.f-item,.mob-filter-btn,.m-tab{-webkit-tap-highlight-color:transparent;touch-action:manipulation}
.mob-filter-btn:active,.m-tab:active{transform:scale(.96);transition:transform .08s}

/* 카드 진입 애니메이션 */
@keyframes fadeUp{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.press-card{animation:fadeUp .22s ease both}

/* shimmer 스켈레톤 */
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3,#E8E5DF) 50%,var(--bg2) 75%);background-size:200% 100%;animation:shimmer 1.6s ease-in-out infinite;border-radius:var(--r-sm)}

/* 로딩 개선 */
.loading{padding:48px 0}
.loading-spinner{width:28px;height:28px;border-width:1.5px;border-top-color:var(--text);border-color:var(--border) var(--border) var(--border) var(--text)}
.empty{padding:48px 24px}.empty-icon{font-size:24px;margin-bottom:12px;opacity:.35}

/* === 오늘의 핵심 히어로 === */
.daily-hero{display:none;grid-template-columns:1fr 1fr;grid-template-rows:auto auto;gap:var(--sp-3);margin-bottom:var(--sp-6)}
.daily-hero.has-items{display:grid}
.hero-main{grid-column:1;grid-row:1/3;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);padding:var(--sp-6);cursor:pointer;transition:box-shadow var(--t-base),border-color var(--t-base);display:flex;flex-direction:column;gap:var(--sp-3);position:relative;overflow:hidden}
.hero-main::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--hero-accent,var(--accent));border-radius:var(--r-lg) var(--r-lg) 0 0}
.hero-main:hover{box-shadow:var(--shadow-3);border-color:var(--border2)}
.hero-label{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:var(--sp-2)}
.hero-label::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--hero-accent,var(--accent))}
.hero-title{font-family:var(--serif);font-size:18px;font-weight:700;line-height:1.42;letter-spacing:-.5px;color:var(--text);display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.hero-summary{font-size:12px;color:var(--text2);line-height:1.7;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;flex:1}
.hero-footer{display:flex;align-items:center;justify-content:space-between;margin-top:auto}
.hero-badge{font-family:var(--mono);font-size:11px;padding:3px 8px;border-radius:var(--r-sm);background:var(--hero-bg,var(--accent-l));color:var(--hero-accent,var(--accent))}
.hero-sub{background:var(--surface);border:1px solid var(--border);border-radius:var(--r-md);padding:var(--sp-4) var(--sp-5);cursor:pointer;transition:box-shadow var(--t-base),border-color var(--t-base);display:flex;flex-direction:column;gap:var(--sp-2);position:relative}
.hero-sub::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--hero-accent,var(--accent));border-radius:var(--r-md) 0 0 var(--r-md)}
.hero-sub:hover{box-shadow:var(--shadow-2);border-color:var(--border2)}
.hero-sub .hero-title{font-size:14px;-webkit-line-clamp:2;font-family:var(--sans)}
.hero-sub .hero-summary{-webkit-line-clamp:2;font-size:11px}
.hero-time{font-family:var(--mono);font-size:10px;color:var(--muted)}

/* 모바일 히어로 */
@media(max-width:768px){
  .daily-hero{grid-template-columns:1fr;grid-template-rows:auto;margin-bottom:var(--sp-4)}
  .hero-main{grid-column:1;grid-row:auto;padding:var(--sp-4)}
  .hero-main .hero-title{font-size:16px}
  .hero-sub{padding:var(--sp-3) var(--sp-4)}
}

/* === 모바일 스크롤 은닉 === */
.m-header{transition:transform var(--t-slow)}
.m-header.scrolled-down{transform:translateY(-100%)}
.m-cat-tabs{transition:transform var(--t-slow)}
.m-cat-tabs.scrolled-down{transform:translateY(calc(-1 * var(--mob-h) - 100%))}

/* === 상세 슬라이드인 패널 (데스크톱) === */
@media(min-width:769px){
  .detail{top:56px;right:0;left:auto;width:420px;max-width:42vw;max-height:none;height:calc(100vh - 56px);border-radius:0;border-left:1px solid var(--border);box-shadow:var(--shadow-4);transform:translateX(100%);transition:transform var(--t-slow)}

/* 모바일 탭 칩 스타일 */
.m-tab{border-radius:20px;border:1.5px solid var(--border);background:var(--surface);padding:0 var(--sp-3);height:32px;flex-direction:row;gap:4px;margin:0 2px}

@media(min-width:1400px){

<!-- 모바일 전용 헤더 -->

</nav>

<script>
const SITE_URL='https://govbrief.kr';
const CC={'금융경제':'#1A47CC','사회복지':'#0F6B3A','산업기술':'#9A4A0A','외교안보':'#A31515','행정법제':'#5B20B8'};
/* CB 제거: mkCard에서 col+'14'(hex alpha)로 동적 생성 */
const CN={'금융경제':'금융·경제','사회복지':'사회·복지','산업기술':'산업·기술','외교안보':'외교·안보','행정법제':'행정·법제'};
const CO=['금융경제','사회복지','산업기술','외교안보','행정법제'];
let allItems=[],curFilter='all',curView='grid',curSearch='',curDate=new Date(),expanded={};
let groupedByCat={},countsByCat={},countsBySource={},countsByFinSub={},sortedSources=[];

const FIN_SUB_MAP={
  '금융위원회':'금융정책','재정경제부':'금융정책','기획재정부':'금융정책','국세청':'금융정책','관세청':'금융정책',
  '금융감독원':'감독규제','공정거래위원회':'감독규제','예금보험공사':'감독규제',
  '한국은행':'시장통화','한국거래소':'시장통화','한국예탁결제원':'시장통화','한국투자공사':'시장통화',
  '금융결제원':'금융인프라','금융보안원':'금융인프라','한국신용정보원':'금융인프라',
  '한국산업은행':'정책금융','한국수출입은행':'정책금융','한국주택금융공사':'정책금융','신용보증기금':'정책금융','기술보증기금':'정책금융','서민금융진흥원':'정책금융','한국자산관리공사':'정책금융',
  '은행연합회':'업계동향','금융투자협회':'업계동향','보험개발원':'업계동향','한국증권금융':'업계동향',
  '산업통상자원부':'금융정책','산업통상부':'금융정책','조달청':'금융정책',
};

function cleanTitle(t){return t.replace(/^\s*(\[[^\]]*\]|\([^)]*\))\s*/,'').replace(/새글$/,'').trim()}
function fmtDate(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function fmtDateKo(d){const days=['일','월','화','수','목','금','토'];return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일 ${days[d.getDay()]}요일`}
function changeDate(dir){curDate.setDate(curDate.getDate()+dir);loadData()}

/* JSON 데이터 로드 (WordPress API 대신 정적 JSON) */
async function loadData(){
  const _skels=Array(4).fill(0).map(()=>`<div class="press-card" style="animation:none;cursor:default"><div style="display:flex;gap:8px;margin-bottom:12px"><div style="height:20px;width:64px;background:var(--bg2);border-radius:4px;animation:shimmer 1.4s infinite"></div></div><div style="height:16px;width:85%;background:var(--bg2);border-radius:4px;margin-bottom:10px;animation:shimmer 1.4s infinite"></div><div style="height:12px;width:70%;background:var(--bg2);border-radius:4px;margin-bottom:8px;animation:shimmer 1.4s infinite"></div><div style="height:10px;width:40%;background:var(--bg2);border-radius:4px;animation:shimmer 1.4s infinite"></div></div>`).join('');
  document.getElementById('main-content').innerHTML=`<style>@keyframes shimmer{0%{background-position:200% 0}to{background-position:-200% 0}}[style*="shimmer"]{background:linear-gradient(90deg,var(--bg2) 25%,var(--border) 50%,var(--bg2) 75%);background-size:200% 100%}</style><div class="cards-grid">${_skels}</div>`;
  const ds=fmtDate(curDate);
  const wd=curDate.getDay();

  let dateFiles=[ds], titleSuffix='';
  if(wd===6){
    const mon=new Date(curDate);mon.setDate(curDate.getDate()-(curDate.getDay()-1));
    dateFiles=[];for(let d=new Date(mon);d<=curDate;d.setDate(d.getDate()+1))dateFiles.push(fmtDate(d));
    titleSuffix=' (주간 종합)';
  } else if(wd===0){
    const mon=new Date(curDate);mon.setDate(curDate.getDate()-6);
    dateFiles=[];for(let d=new Date(mon);d<=curDate;d.setDate(d.getDate()+1))dateFiles.push(fmtDate(d));
    titleSuffix=' (주간 종합)';
  }

  document.getElementById('date-label').textContent=ds;
  const mbl=document.getElementById('mobile-date-label');
  if(mbl) mbl.textContent=curDate.getMonth()+1+'월 '+curDate.getDate()+'일';
  const _today=new Date();const _isToday=fmtDate(curDate)===fmtDate(_today);const _yest=new Date(_today);_yest.setDate(_today.getDate()-1);const _isYesterday=fmtDate(curDate)===fmtDate(_yest);const _dayLabel=_isToday?' (오늘)':_isYesterday?' (어제)':'';
  // 데스크톱 헤더 날짜 표시
  const hdrDate=document.getElementById('header-date');
  if(hdrDate) hdrDate.textContent=`${curDate.getMonth()+1}월 ${curDate.getDate()}일${_dayLabel}${titleSuffix}`;

  try{
    let items=[];
    const _results=await Promise.allSettled(dateFiles.map(df=>fetch(`/data/${df}.json`).then(r=>r.ok?r.json():null).catch(()=>null)));
    for(const _r of _results){
      if(_r.status!=='fulfilled'||!_r.value)continue;
      const json=_r.value;const df=json.target_date||'';
      const dayItems=(json.items||[]).map(it=>({
          id: `${it.date}_${it.source}_${(it.title||'').slice(0,30)}`.replace(/\s+/g,'_'),
          title: cleanTitle(it.title||''),
          src: it.source||'',
          sum: it.summary||'',
          kws: it.keywords||[],
          orig: it.url||'',
          date: it.date||df,
          cat: it.category||'행정법제',
          finSub: it.finance_sub||FIN_SUB_MAP[it.source]||'',
          impact: it.impact||'중',
        }));
      items.push(...dayItems);
    }
    // 중복 제거 (제목 기준) + 요약 없는 건 제외
    const seen=new Set();
    items=items.filter(it=>{
      if(seen.has(it.title))return false;
      seen.add(it.title);
      // 요약이 없거나 "[텍스트 없음]", "[한도 초과]", "[오류]" 인 건 제외
      if(!it.sum||it.sum.length<5||it.sum.startsWith('[텍스트 없음]')||it.sum.startsWith('[한도 초과]')||it.sum.startsWith('[오류]'))return false;
      return true;
    });
    allItems=items;rebuildIndexes();render();updateSidebar();renderDailyHero();renderTopPicks();renderSourceBadges();updateMobileUI();
    // 토요일/일요일 특별 블록
    renderSpecialBlock();
    // 탭 필터 상태 복원
    if(curFilter!=='all'){
      // 현재 필터가 카테고리인지 부처인지 판별
      const cats=['금융경제','사회복지','산업기술','외교안보','행정법제'];
      let activeCat=curFilter;
      if(!cats.includes(curFilter)){
        // 부처 필터 → 해당 부처의 카테고리 찾기
        const match=allItems.find(i=>i.src===curFilter);
        if(match)activeCat=match.cat;
      }
      const catIdx={'금융경제':1,'사회복지':2,'산업기술':3}[activeCat];
      const tabs=document.querySelectorAll('.m-tab');
      tabs.forEach(t=>t.classList.remove('active'));
      if(catIdx!==undefined&&tabs[catIdx])tabs[catIdx].classList.add('active');
      // mSetTab 호출하여 헤더 복원
      if(catIdx!==undefined&&tabs[catIdx]){
        const savedFilter=curFilter;
        mSetTab(activeCat,tabs[catIdx]);
        curFilter=savedFilter;
        render();
      }
    }
  }catch(e){document.getElementById('main-content').innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><div>로드 실패: ${escapeHtml(e.message)}</div></div>`}
}

function rebuildIndexes(){
  groupedByCat={};countsByCat={};countsBySource={};countsByFinSub={};sortedSources=[];
  allItems.forEach(it=>{
    (groupedByCat[it.cat]=groupedByCat[it.cat]||[]).push(it);
    countsByCat[it.cat]=(countsByCat[it.cat]||0)+1;
    countsBySource[it.src]=(countsBySource[it.src]||0)+1;
    const finSub=it.finSub||FIN_SUB_MAP[it.src];
    if(finSub) countsByFinSub[finSub]=(countsByFinSub[finSub]||0)+1;
  });
  sortedSources=Object.keys(countsBySource).sort((a,b)=>a.localeCompare(b,'ko'));
}
function escapeHtml(s){return String(s??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;')}
function setHighlightedText(el,text,keywords=[]){
  const source=String(text||'');
  const terms=[...new Set((keywords||[]).filter(k=>k&&k.length>1))];
  el.textContent='';
  if(!terms.length){el.textContent=source;return}
  const parts=terms.map(k=>k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'));
  const re=new RegExp(`(${parts.join('|')})`,'gi');
  let last=0;
  source.replace(re,(match,_g,offset)=>{
    if(offset>last)el.appendChild(document.createTextNode(source.slice(last,offset)));
    const mark=document.createElement('mark');mark.textContent=match;el.appendChild(mark);
    last=offset+match.length;return match;
  });
  if(last<source.length)el.appendChild(document.createTextNode(source.slice(last)));
}
function makeMetaHtml(label,value){return `<div class="d-meta-i"><span>${escapeHtml(label)}</span><strong>${escapeHtml(value)}</strong></div>`}
function filtered(){
  let it=allItems;
  if(curFilter!=='all'){
    if(curFilter.startsWith('fin-')){
      const sub=curFilter.slice(4);
      it=it.filter(i=>(i.finSub||FIN_SUB_MAP[i.src])===sub);
    } else {
      it=it.filter(i=>i.cat===curFilter||i.src===curFilter);
    }
  }
  if(curSearch){const q=curSearch.toLowerCase();it=it.filter(i=>i.title.toLowerCase().includes(q)||i.src.toLowerCase().includes(q)||i.sum.toLowerCase().includes(q))}
  return it;
}
function render(){
  const items=filtered();const _tb=document.getElementById('total-badge-hdr');if(_tb)_tb.textContent=`${items.length}건`;
  const c=document.getElementById('main-content');c.innerHTML='';
  if(!items.length){c.innerHTML='<div class="empty"><div class="empty-icon">📭</div><div>보도자료가 없습니다</div></div>';return}
  // sub-bar 완전 제거
  if(curFilter!=='all'){const g=document.createElement('div');g.className=`cards-grid${curView==='list'?' list-view':''}`;items.forEach((it,i)=>g.appendChild(mkCard(it,i)));c.appendChild(g)}
  else{CO.forEach(cat=>{if(!groupedByCat[cat]?.length)return;c.appendChild(mkBlock(cat,groupedByCat[cat]))})}
}
function mkBlock(cat,items){
  const SHOW=4;const isEx=expanded[cat];const shown=isEx?items:items.slice(0,SHOW);
  const b=document.createElement('div');b.className='cat-block';
  const dv=document.createElement('div');dv.className='cat-divider';
  dv.innerHTML=`<div class="cat-divider-dot" style="background:${CC[cat]}"></div><span class="cat-divider-label">${escapeHtml(CN[cat]||cat)}</span><div class="cat-divider-line"></div><span class="cat-divider-info">${items.length}건</span>`;
  b.appendChild(dv);
  const g=document.createElement('div');g.className=`cards-grid${curView==='list'?' list-view':''}`;
  shown.forEach((it,i)=>g.appendChild(mkCard(it,i)));
  const h=items.length-SHOW;
  if(!isEx&&h>0){const btn=document.createElement('button');btn.className='more-btn';btn.innerHTML=`▾ ${h}개 더보기`;btn.onclick=()=>{expanded[cat]=true;render()};g.appendChild(btn)}
  else if(isEx&&items.length>SHOW){const btn=document.createElement('button');btn.className='more-btn';btn.innerHTML='▴ 접기';btn.onclick=()=>{expanded[cat]=false;render()};g.appendChild(btn)}
  b.appendChild(g);return b;
}
function mkCard(it,idx){
  const col=CC[it.cat]||'#1d4ed8';const bg=col+'14'; /* CB 틴트 제거 → hex+alpha */
  const c=document.createElement('div');c.className='press-card';
  c.style.cssText=`animation-delay:${Math.min(idx,8)*.04}s`;
  if(curView==='list'){
    c.innerHTML=`<div style="width:72px;flex-shrink:0;text-align:center"><span class="m-badge" style="background:${bg};color:${col}"></span></div><div class="card-body" style="flex:1;min-width:0"><div class="card-title" style="-webkit-line-clamp:1;margin-bottom:0"></div><div class="card-meta"><span class="card-meta-i"></span></div></div><div class="card-actions" style="margin-top:0"><button class="c-btn primary" type="button">보기</button></div>`;
    c.querySelector('.m-badge').textContent=it.src||'정부';
    c.querySelector('.card-title').textContent=it.title||'';
    c.querySelector('.card-meta-i').textContent=`📅 ${it.date||''}`;
    c.querySelector('.c-btn.primary').addEventListener('click',e=>{e.stopPropagation();openDetail(it.id)});
  }else{

function renderDailyHero() {
  const heroEl = document.getElementById('daily-hero');
  if (!heroEl) return;

  let top3Items = [];

  const highImpact = allItems.filter(it => it.impact === '상');
  const midImpact = allItems.filter(it => it.impact === '중');

  if (highImpact.length >= 3) {
    const used = new Set();
    for (const it of highImpact) {
      if (top3Items.length >= 3) break;
      const catCount = top3Items.filter(t => t.cat === it.cat).length;
      if (catCount < 2) { top3Items.push(it); used.add(it.cat); }
    }
  }
  if (top3Items.length < 3) {
    for (const it of [...highImpact, ...midImpact]) {
      if (top3Items.length >= 3) break;
      if (!top3Items.includes(it)) top3Items.push(it);
    }
  }
  if (top3Items.length < 3) {
    for (const it of allItems) {
      if (top3Items.length >= 3) break;
      if (!top3Items.includes(it)) top3Items.push(it);
    }
  }

  if (top3Items.length === 0) { heroEl.classList.remove('has-items'); return; }

  const col = (cat) => CC[cat] || '#1A47CC';
  const catBg = {'금융경제':'var(--c-fin-l)','사회복지':'var(--c-soc-l)','산업기술':'var(--c-ind-l)','외교안보':'var(--c-dip-l)','행정법제':'var(--c-adm-l)'};

  let html = '';

  if (top3Items[0]) {
    const it = top3Items[0];
    const c = col(it.cat);
    html += '<div class="hero-main" style="--hero-accent:'+c+';--hero-bg:'+(catBg[it.cat]||'var(--accent-l)')+'" onclick="openDetail(\''+it.id+'\')">'
      + '<div class="hero-label">오늘의 핵심</div>'
      + '<div class="hero-title">'+escapeHtml(it.title)+'</div>'
      + '<div class="hero-summary">'+escapeHtml(it.sum)+'</div>'
      + '<div class="hero-footer">'
      + '<span class="hero-badge" style="background:'+(catBg[it.cat]||'var(--accent-l)')+';color:'+c+'">'+escapeHtml(it.src)+'</span>'
      + '<span class="hero-time">'+(CN[it.cat]||escapeHtml(it.cat))+'</span>'
      + '</div></div>';
  }

  for (let i = 1; i < Math.min(top3Items.length, 3); i++) {
    const it = top3Items[i];
    const c = col(it.cat);
    html += '<div class="hero-sub" style="--hero-accent:'+c+';--hero-bg:'+(catBg[it.cat]||'var(--accent-l)')+'" onclick="openDetail(\''+it.id+'\')">'
      + '<div class="hero-footer" style="margin-top:0">'

      + '<div class="hero-title">'+escapeHtml(it.title)+'</div>'
      + '<div class="hero-summary">'+escapeHtml(it.sum)+'</div>'
      + '</div>';
  }

  heroEl.innerHTML = html;
  heroEl.classList.add('has-items');
}

async function renderSpecialBlock(){
  const cal=document.getElementById('schedule-calendar');
  if(!cal)return;
  const wd=curDate.getDay();
  const todayStr=fmtDate(new Date());
  const DOW_COLORS={'월':'#1A47CC','화':'#0F6B3A','수':'#9A4A0A','목':'#A31515','금':'#5B20B8'};

  // 일정 JSON 로드 시도
  let schedData=null;
  const schedFiles=['schedule-latest.json'];
  // 일요일이면 당일 기준, 평일이면 직전 일요일 기준
  if(wd===0) schedFiles.unshift(`schedule-${fmtDate(curDate)}.json`);
  else {
    const prevSun=new Date(curDate);prevSun.setDate(curDate.getDate()-wd);
    schedFiles.unshift(`schedule-${fmtDate(prevSun)}.json`);
  }
  for(const sf of schedFiles){
    try{
      const r=await fetch(`/data/${sf}`);
      if(r.ok){schedData=await r.json();break}
    }catch(e){}
  }
  if(!schedData||!schedData.days||Object.keys(schedData.days).length===0){
    cal.classList.remove('has-data');return;
  }

  const days=schedData.days;
  const dates=Object.keys(days).sort();
  const dows=['일','월','화','수','목','금','토'];

  // 헤더
  const first=new Date(dates[0]+'T00:00:00');
  const last=new Date(dates[dates.length-1]+'T00:00:00');
  const rangeLabel=`${first.getMonth()+1}/${first.getDate()}(${dows[first.getDay()]}) ~ ${last.getMonth()+1}/${last.getDate()}(${dows[last.getDay()]})`;
  const isNextWeek=wd===0;
  const titleText=isNextWeek?'다음주 주요 일정':'이번주 주요 일정';

  let html=`<div class="sched-hdr">
    <div class="sched-title"><i class="ph ph-calendar-blank"></i> ${titleText}</div>
    <span class="sched-range">${rangeLabel} · ${schedData.total}건</span>
  </div>`;

  // 달력 그리드
  html+='<div class="sched-grid">';
  for(const d of dates){
    const dt=new Date(d+'T00:00:00');
    const dow=dows[dt.getDay()];
    const items=days[d]||[];
    const isToday=d===todayStr;
    const isPast=d<todayStr;
    const dayClass='sched-day'+(isToday?' today':'')+(isPast?' past':'');
    const dowColor=DOW_COLORS[dow]||'var(--accent)';

    html+=`<div class="${dayClass}">`;
    html+=`<div class="sched-day-hdr">
      <div><span class="sched-day-num" style="color:${dowColor}">${dt.getDate()}</span>
      <span class="sched-day-dow" style="color:${dowColor}">${dow}</span></div>
      ${items.length?`<span class="sched-day-cnt">${items.length}건</span>`:''}
    </div>`;

    html+='<div class="sched-items">';
    const show=items.slice(0,3);
    for(const it of show){
      const time=it.time||'';
      const src=(it.source||'').replace(/부$/,'').slice(0,4);
      html+=`<div class="sched-item">
        ${time?`<span class="sched-item-time">${time}</span>`:''}
        <span class="sched-item-src" style="color:${dowColor}">${escapeHtml(src)}</span>
        <span class="sched-item-title">${escapeHtml(it.title||'')}</span>
      </div>`;
    }
    if(items.length>3){
      html+=`<span class="sched-more">+${items.length-3}건 더</span>`;
    }
    if(!items.length){
      html+=`<span style="font-size:11px;color:var(--muted)">일정 없음</span>`;
    }
    html+='</div></div>';
  }
  html+='</div>';

  // 전체 보기 링크
  const schedDate=wd===0?fmtDate(curDate):fmtDate((()=>{const s=new Date(curDate);s.setDate(curDate.getDate()-wd);return s})());
  html+=`<a class="sched-link" href="/articles/schedule/${schedDate}/"><i class="ph ph-arrow-square-out"></i> 전체 일정 보기</a>`;

  cal.innerHTML=html;
  cal.classList.add('has-data');
}
function renderSourceBadges(){
  const box=document.getElementById('source-badges');
  if(!allItems.length){box.style.display='none';return}
  const prioritySources=['국토교통부','금융위원회','산업통상자원부','산업통상부'];
  const sorted=Object.entries(countsBySource).sort((a,b)=>b[1]-a[1]);
  const priority=[];
  prioritySources.forEach(src=>{
    const found=sorted.find(([s])=>s===src);
    if(found && !priority.some(([s])=>s===found[0])) priority.push(found);
  });
  const others=sorted.filter(([s])=>!prioritySources.some(p=>s.includes(p)));
  const show=priority.slice(0,3);
  box.style.display='flex';box.textContent='';
  show.forEach(([src,cnt])=>{
    const tag=document.createElement('span');
    const isActive=curFilter===src;
    tag.style.cssText=isActive
      ?'font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:12px;border:1px solid var(--accent);color:#fff;background:var(--accent);cursor:pointer;white-space:nowrap'
      :'font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:12px;border:1px solid var(--accent);color:var(--accent);cursor:pointer;white-space:nowrap;background:var(--accent-l)';
    tag.textContent=`${src} ${cnt}`;
    tag.addEventListener('click',()=>{curFilter=src;render();renderSourceBadges()});
    box.appendChild(tag);
  });
  // 더보기 버튼 + 선택된 부처명 표시
  const isPriorityFilter = prioritySources.some(p=>curFilter===p);
  const isOtherFilter = curFilter!=='all' && !isPriorityFilter && !['금융경제','사회복지','산업기술','외교안보','행정법제'].includes(curFilter);

  if(others.length>0){
    const more=document.createElement('span');
    more.style.cssText='font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:12px;border:1px solid var(--border);color:var(--muted);cursor:pointer;white-space:nowrap';
    more.textContent=`+${others.length}개 부처 더보기`;
    more.addEventListener('click',()=>{
      box.textContent='';
      sorted.forEach(([src,cnt])=>{
        const tag=document.createElement('span');
        const isActive=curFilter===src;
        tag.style.cssText=isActive
          ?'font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:12px;border:1px solid var(--accent);color:#fff;background:var(--accent);cursor:pointer;white-space:nowrap'
          :'font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:12px;border:1px solid var(--border);color:var(--text2);cursor:pointer;white-space:nowrap';
        tag.textContent=`${src} ${cnt}`;
        tag.addEventListener('click',()=>{curFilter=src;render();renderSourceBadges()});
        box.appendChild(tag);
      });
      const fold=document.createElement('span');
      fold.style.cssText='font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:12px;border:1px solid var(--border);color:var(--muted);cursor:pointer;white-space:nowrap';
      fold.textContent='접기 ▲';
      fold.addEventListener('click',()=>{renderSourceBadges()});
      box.appendChild(fold);
    });
    box.appendChild(more);

    // 선택된 부처가 우선부처가 아니면 옆에 표시
    if(isOtherFilter){
      const sel=document.createElement('span');
      sel.style.cssText='font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:12px;border:1px solid var(--accent);color:#fff;background:var(--accent);cursor:pointer;white-space:nowrap';
      const cnt=countsBySource[curFilter]||0;
      sel.textContent=`${curFilter} ${cnt}`;
      sel.addEventListener('click',()=>{curFilter='all';render();renderSourceBadges()});
      box.appendChild(sel);
    }
  }
}

  det.addEventListener('touchmove',e=>{

    const _t=new Date();const _isT=ds===fmtDate(_t);const _y=new Date(_t);_y.setDate(_t.getDate()-1);const _isY=ds===fmtDate(_y);
    const dayLabel=_isT?' (오늘)':_isY?' (어제)':'';

    if(!catHdr){
      catHdr=document.createElement('div');
      catHdr.id='m-cat-hdr';
      catHdr.style.cssText='padding:8px 16px 4px';
    }

    // 해당 분류 내 부처 추출
    const catSources={};
    allItems.forEach(it=>{
      if(it.cat===cat){catSources[it.src]=(catSources[it.src]||0)+1}
    });
    const sortedSrc=Object.entries(catSources).sort((a,b)=>b[1]-a[1]);

    catHdr.innerHTML=`<div style="font-family:var(--serif);font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px">${curDate.getMonth()+1}월 ${curDate.getDate()}일 보도자료 (${catLabel})${dayLabel}</div><div id="m-cat-badges" style="display:flex;flex-wrap:wrap;gap:0"></div>`;

    const mc=document.getElementById('main-content');
    mc.parentElement.insertBefore(catHdr,mc);
    const badgeDiv=catHdr.querySelector('#m-cat-badges');
    sortedSrc.forEach(([src,cnt])=>{
      const isActive=curFilter===src;
      const span=document.createElement('span');
      span.style.cssText=isActive
        ?'font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:12px;border:1px solid var(--accent);color:#fff;background:var(--accent);cursor:pointer;white-space:nowrap;display:inline-block;margin:2px 3px 2px 0'
        :'font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:12px;border:1px solid var(--border);color:var(--text2);cursor:pointer;white-space:nowrap;display:inline-block;margin:2px 3px 2px 0';
      span.textContent=`${src} ${cnt}`;
      span.addEventListener('click',()=>mFilterSource(src,cat));
      badgeDiv.appendChild(span);
    });
  } else {
    if(catHdr)catHdr.remove();
    // 기존 m-cat-date도 정리
    const old=document.getElementById('m-cat-date');if(old)old.remove();
  }
  render();
}

function mFilterSource(src,cat){
  // 같은 부처 다시 클릭하면 분류 전체로 복귀
  if(curFilter===src){curFilter=cat}else{curFilter=src}
  // 탭 활성 상태 유지
  const tabs=document.querySelectorAll('.m-tab');
  const catIdx={'금융경제':1,'사회복지':2,'산업기술':3}[cat];
  if(catIdx!==undefined){
    tabs.forEach(t=>t.classList.remove('active'));
    tabs[catIdx].classList.add('active');
  }
  // 부처 뱃지 갱신 위해 mSetTab 재호출하되 렌더만
  const catSources={};
  allItems.forEach(it=>{if(it.cat===cat){catSources[it.src]=(catSources[it.src]||0)+1}});
  const sortedSrc=Object.entries(catSources).sort((a,b)=>b[1]-a[1]);
  const hdr=document.getElementById('m-cat-hdr');
  if(hdr){
    const badgeDiv=hdr.querySelector('div:last-child');
    if(badgeDiv){
      badgeDiv.innerHTML='';
      sortedSrc.forEach(([s,cnt])=>{
        const isActive=curFilter===s;
        const span=document.createElement('span');
        span.style.cssText=isActive
          ?'font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:12px;border:1px solid var(--accent);color:#fff;background:var(--accent);cursor:pointer;white-space:nowrap;display:inline-block;margin:2px 3px 2px 0'
          :'font-family:var(--mono);font-size:10px;padding:4px 10px;border-radius:12px;border:1px solid var(--border);color:var(--text2);cursor:pointer;white-space:nowrap;display:inline-block;margin:2px 3px 2px 0';
        span.textContent=`${s} ${cnt}`;
        span.addEventListener('click',()=>mFilterSource(s,cat));
        badgeDiv.appendChild(span);
      });
    }
  }
  render();
}

  } else {
    shareTelegram();
  }
}

// 모바일 스크롤 은닉
(function(){
  let lastY=0;
  window.addEventListener('scroll',function(){
    if(window.innerWidth>768)return;
    const y=window.scrollY;
    const mh=document.getElementById('m-header');
    const mt=document.getElementById('m-cat-tabs');
    if(y<60){mh&&mh.classList.remove('scrolled-down');mt&&mt.classList.remove('scrolled-down');lastY=y;return}
    if(y-lastY>4){mh&&mh.classList.add('scrolled-down');mt&&mt.classList.add('scrolled-down')}
    else if(lastY-y>4){mh&&mh.classList.remove('scrolled-down');mt&&mt.classList.remove('scrolled-down')}
    lastY=y;
  },{passive:true});
})();
